<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open House Registration — Agntai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { max-width: 600px; width: 100%; }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 48px 32px;
      text-align: center;
    }
    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: #1a6b4a;
      margin-bottom: 24px;
    }
    .header-line {
      height: 2px;
      background: #1a6b4a;
      margin-bottom: 32px;
    }
    .property-address {
      font-size: 32px;
      font-weight: 700;
      color: #1a1916;
      margin-bottom: 16px;
      text-transform: capitalize;
    }
    .property-meta {
      font-size: 16px;
      color: #6b6760;
      margin-bottom: 40px;
    }
    .property-price {
      font-size: 18px;
      font-weight: 600;
      color: #1a6b4a;
      margin-bottom: 32px;
      display: none;
    }
    .property-details {
      font-size: 13px;
      color: #6b6760;
      line-height: 1.8;
      margin-bottom: 32px;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .detail-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .qr-container {
      margin: 40px auto;
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      padding: 20px;
      background: #f9f8f6;
      border-radius: 8px;
    }
    .qr-container img {
      max-width: 200px;
      width: 100%;
      height: auto;
    }
    .qr-label {
      font-size: 16px;
      font-weight: 600;
      color: #1a6b4a;
      margin: 24px 0;
      display: none;
    }
    .form-section { margin-bottom: 18px; text-align: left; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1a1916;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d5d0c8;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      outline: none;
      border-color: #1a6b4a;
      box-shadow: 0 0 0 3px rgba(26, 107, 74, 0.1);
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    input[type="radio"] {
      margin-right: 8px;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    .radio-option label {
      margin: 0;
      font-weight: 400;
      cursor: pointer;
      font-size: 14px;
    }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 12px;
      font-size: 13px;
      color: #991b1b;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    button {
      width: 100%;
      padding: 12px;
      background: #1a6b4a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #155339; }
    button:disabled {
      background: #b5b0a8;
      cursor: not-allowed;
    }
    .success-message {
      background: #f0faf5;
      border: 1px solid #bbf0d8;
      border-radius: 6px;
      padding: 24px;
      text-align: center;
      display: none;
    }
    .success-message.show { display: block; }
    .success-message h2 {
      font-size: 24px;
      color: #1a6b4a;
      margin-bottom: 8px;
    }
    .success-message p {
      font-size: 14px;
      color: #1a6b4a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">🏠</div>
      <div class="logo-text">Agntai</div>
      <div class="header-line"></div>

      <div id="propertyInfo">
        <div class="property-address" id="address"></div>
        <div class="property-meta" id="date"></div>
        <div class="property-price" id="price"></div>

        <div class="property-details" id="details"></div>

        <div class="qr-container">
          <img id="qr" alt="QR Code">
        </div>
        <div class="qr-label">Scan to Register Your Visit</div>

        <form id="visitorForm">
          <div class="error" id="error"></div>

          <div class="form-section">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-section">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" required>
          </div>

          <div class="form-section">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-section">
            <label>Do you already have a real estate agent? *</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" id="hasAgentYes" name="has_agent" value="yes" required>
                <label for="hasAgentYes">Yes</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="hasAgentNo" name="has_agent" value="no" required>
                <label for="hasAgentNo">No</label>
              </div>
            </div>
          </div>

          <button type="submit" id="submitBtn">Register for Open House</button>
        </form>
      </div>

      <div id="successMessage" class="success-message">
        <h2>✓ Thank You!</h2>
        <p>Your information has been registered. We'll be in touch shortly.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ivjdhgyaqbuqtjbqlnu.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2amRoZ3lhcWJ1cXRqYnFsbnUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxNjMzNDMyOSwiZXhwIjoxODc0MDEwMzI5fQ.LwAc8a1-Eb-u0sWGWpBK4dXaEiLXQOYvFVU_uHMbj4E";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const urlParams = new URLSearchParams(window.location.search);
    const openHouseId = urlParams.get("id");
    const address = urlParams.get("address") || "Property Address";
    const date = urlParams.get("date");
    const price = urlParams.get("price");
    const bedrooms = urlParams.get("bedrooms");
    const bathrooms = urlParams.get("bathrooms");
    const sqft = urlParams.get("sqft");

    if (!openHouseId) {
      document.getElementById("propertyInfo").innerHTML = "<p>Invalid link. No property found.</p>";
    } else {
      loadProperty();
    }

    function capitalizeAddress(addr) {
      return addr.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
    }

    function loadProperty() {
      document.getElementById("address").textContent = capitalizeAddress(address);

      if (date) {
        document.getElementById("date").textContent = new Date(date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }

      const priceText = price ? (price.startsWith('$') ? price : '$ ' + price) : '';
      document.getElementById("price").textContent = priceText;

      const details = [];
      if (bedrooms) details.push(`🛏️ ${bedrooms} Bed${bedrooms !== 1 ? 's' : ''}`);
      if (bathrooms) details.push(`🚿 ${bathrooms} Bath${bathrooms !== 1 ? 's' : ''}`);
      if (sqft) details.push(`📐 ${sqft.toLocaleString()} sq ft`);

      const detailsHtml = details.map(d => `<div class="detail-item">${d}</div>`).join('');
      document.getElementById("details").innerHTML = detailsHtml;

      const qrUrl = `https://agntai.app/open-house?id=${openHouseId}&address=${encodeURIComponent(address)}&date=${encodeURIComponent(date || '')}&price=${encodeURIComponent(price || '')}&bedrooms=${encodeURIComponent(bedrooms || '')}&bathrooms=${encodeURIComponent(bathrooms || '')}&sqft=${encodeURIComponent(sqft || '')}`;
      document.getElementById('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(qrUrl);
    }

    document.getElementById("visitorForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById("error");
      errorDiv.classList.remove("show");

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const hasAgent = document.getElementById("hasAgentYes").checked;

      if (!name || !phone || !email) {
        errorDiv.textContent = "Please fill in all required fields.";
        errorDiv.classList.add("show");
        return;
      }

      document.getElementById("submitBtn").disabled = true;
      document.getElementById("submitBtn").textContent = "Registering...";

      try {
        console.log('Submitting to Edge Function...');
        const payload = {
          open_house_id: openHouseId,
          name,
          phone,
          email,
          has_agent: hasAgent,
          address,
          date,
          price,
          bedrooms,
          bathrooms,
          sqft
        };
        console.log('Payload:', payload);

        const response = await fetch(
          "https://ivjdhgyaqbuqtjbqlnu.supabase.co/functions/v1/open-house-submit",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          }
        );

        const text = await response.text();
        console.log('Response:', response.status, text);

        if (!response.ok) {
          throw new Error(text || response.statusText);
        }

        document.getElementById("propertyInfo").style.display = "none";
        document.getElementById("successMessage").classList.add("show");
      } catch (err) {
        console.error('Error:', err);
        errorDiv.textContent = 'Registration failed. Please try again.';
        errorDiv.classList.add("show");
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("submitBtn").textContent = "Register for Open House";
      }
    });
  </script>
</body>
</html>
