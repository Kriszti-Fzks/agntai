<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open House Registration — Agntai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f7f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { max-width: 600px; width: 100%; }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 48px 32px;
      text-align: center;
    }
    .logo { font-size: 32px; margin-bottom: 8px; }
    .logo-text { font-size: 24px; font-weight: 700; color: #1a6b4a; margin-bottom: 24px; }
    .header-line { height: 2px; background: #1a6b4a; margin-bottom: 32px; }
    .property-address { font-size: 32px; font-weight: 700; color: #1a1916; margin-bottom: 16px; text-transform: capitalize; }
    .property-meta { font-size: 16px; color: #6b6760; margin-bottom: 40px; }
    .form-section { margin-bottom: 18px; text-align: left; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1a1916; margin-bottom: 6px; }
    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d5d0c8;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="tel"]:focus {
      outline: none;
      border-color: #1a6b4a;
      box-shadow: 0 0 0 3px rgba(26, 107, 74, 0.1);
    }
    .radio-group { display: flex; gap: 20px; margin-top: 8px; }
    .radio-option { display: flex; align-items: center; cursor: pointer; }
    input[type="radio"] { margin-right: 8px; cursor: pointer; width: 18px; height: 18px; }
    .radio-option label { margin: 0; font-weight: 400; cursor: pointer; font-size: 14px; }
    .error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 12px; font-size: 13px; color: #991b1b; margin-bottom: 16px; display: none; }
    .error.show { display: block; }
    button {
      width: 100%;
      padding: 12px;
      background: #1a6b4a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #155339; }
    button:disabled { background: #b5b0a8; cursor: not-allowed; }
    .success-message { background: #f0faf5; border: 1px solid #bbf0d8; border-radius: 6px; padding: 24px; text-align: center; display: none; }
    .success-message.show { display: block; }
    .success-message h2 { font-size: 24px; color: #1a6b4a; margin-bottom: 8px; }
    .success-message p { font-size: 14px; color: #1a6b4a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">🏠</div>
      <div class="logo-text">Agntai</div>
      <div class="header-line"></div>

      <div id="propertyInfo">
        <div class="property-address" id="address"></div>
        <div class="property-meta" id="date"></div>

        <form id="visitorForm">
          <div class="error" id="error"></div>

          <div class="form-section">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-section">
            <label for="phone">Phone Number *</label>
            <input type="tel" id="phone" name="phone" required>
          </div>

          <div class="form-section">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-section">
            <label>Do you already have a real estate agent? *</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" id="hasAgentYes" name="has_agent" value="yes" required>
                <label for="hasAgentYes">Yes</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="hasAgentNo" name="has_agent" value="no" required>
                <label for="hasAgentNo">No</label>
              </div>
            </div>
          </div>

          <button type="submit" id="submitBtn">Register for Open House</button>
        </form>
      </div>

      <div id="successMessage" class="success-message">
        <h2>✓ Thank You!</h2>
        <p>Your information has been registered. We'll be in touch shortly.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const openHouseId = params.get("id");
      const address = params.get("address") || "Property Address";
      const dateStr = params.get("date");

      function capitalizeAddress(addr) {
        return addr.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
      }

      function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }

      document.getElementById("address").textContent = capitalizeAddress(address);
      document.getElementById("date").textContent = formatDate(dateStr);

      document.getElementById("visitorForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById("error");
        errorDiv.classList.remove("show");

        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const email = document.getElementById("email").value.trim();
        const hasAgent = document.getElementById("hasAgentYes").checked;

        if (!name || !phone || !email) {
          errorDiv.textContent = "Please fill in all required fields.";
          errorDiv.classList.add("show");
          return;
        }

        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").textContent = "Registering...";

        try {
          const response = await fetch(
            "https://ivjdhgyaqbufqtjbqlnu.supabase.co/functions/v1/open-house-submit",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer sb_publishable_CeQYsu56whYCoNnqWuaUvw_vNS-7TFL"
              },
              body: JSON.stringify({
                open_house_id: openHouseId,
                name,
                phone,
                email,
                has_agent: hasAgent,
                address,
                date: dateStr
              })
            }
          );

          if (!response.ok) {
            throw new Error("Registration failed");
          }

          document.getElementById("propertyInfo").style.display = "none";
          document.getElementById("successMessage").classList.add("show");
        } catch (err) {
          console.error('Error:', err);
          errorDiv.textContent = "Registration failed. Please try again.";
          errorDiv.classList.add("show");
          document.getElementById("submitBtn").disabled = false;
          document.getElementById("submitBtn").textContent = "Register for Open House";
        }
      });
    })();
  </script>
</body>
</html>
