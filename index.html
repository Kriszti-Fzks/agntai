// ── PROTOCOL AUTO-ASSIGNMENT ──────────────────────────────────────────────────
// Maps the last comm action to the right protocol
// Called when an outbound comm is logged or when a lead has no protocol yet

function autoAssignProtocol(lead, commHistory, transactions) {
  // Already has a protocol — don't override unless it's complete
  if (lead.activeProtocolId) {
    const p = getProtocolById(lead.activeProtocolId);
    if (p && (lead.protocolStep||0) < p.steps.length) return null; // still active
  }

  const s = lead.stage;
  const recentComms = (commHistory||[]).slice(0,3); // look at last 3 comms
  const lastComm = recentComms[0] || null;

  // Rule 0 (highest priority for tenants/landlords): active lease nearing expiry
  // If a lease transaction is linked and ends within 60 days (or up to 14 days overdue),
  // run the lease_renewal protocol so the agent gets unique, time-relevant tasks.
  if ((lead.type === 'Tenant' || lead.type === 'Landlord') && Array.isArray(transactions)) {
    const leaseTx = transactions.find(t =>
      t.lead_id === lead.id &&
      (t.side === 'tenant' || t.side === 'landlord') &&
      t.status !== 'closed' &&
      t.close_date
    );
    if (leaseTx) {
      const today = new Date();
      const closeDate = new Date(leaseTx.close_date);
      const daysToClose = Math.ceil((closeDate - today) / (1000*60*60*24));
      // Activate the renewal protocol when within the 60-day outreach window
      // (or up to 14 days past expiry — agent still needs to help them resolve)
      if (daysToClose <= 60 && daysToClose >= -14) return 'lease_renewal';
    }
  }

  // Rule 1: based on last outbound comm sent
  if (lastComm && lastComm.direction === 'outbound' && lastComm.status === 'sent') {
    const subject = (lastComm.subject||'').toLowerCase();
    const body = (lastComm.body||'').toLowerCase();
    const isListings = subject.includes('home') || subject.includes('listing') ||
      body.includes('listing') || body.includes('homes') || body.includes('properties');

    if (lastComm.channel === 'email' && isListings) return 'sent_listings';
    if (lastComm.channel === 'sms' && isListings) return 'sent_listings';
    if (lastComm.channel === 'email') return 'sent_listings'; // any email = assume listings
  }

  // Rule 2: based on stage
  const stageMap = {
    'New': 'new_lead',
    'Lead': 'new_lead',
    'Spoke With Lead': 'new_lead',
    'Spoke with Lead': 'new_lead',
    'Showing Homes': 'sent_listings',
    'Showing Rentals': 'tenant_showing',
    'Searching Deals': 'sent_listings',
    'Touring Properties': 'sent_listings',
    'Buyer Rep Signed': 'sent_listings',
    'Application Submitted': 'tenant_application',
    'Listing Appointment': 'listing_appointment',
    'Listing Agreement Signed': 'active_listing',
    'Active Listing': 'active_listing',
    'Active Rental Listing': 'landlord_listing',
    'Rental Evaluation': 'new_landlord_lead',
    'Under Contract': 'under_contract',
    'Lease Signed': 'just_closed',
    'Closed': null,
    'Nurture': null,
  };

  // Seller overrides — use seller protocols
  if(lead.type==='Seller'){
    const sellerMap = {
      'New': 'new_lead',
      'Lead': 'new_lead',
      'Spoke With Lead': 'new_lead',
      'Spoke with Lead': 'new_lead',
      'Listing Appointment': 'listing_appointment',
      'Listing Agreement Signed': 'active_listing',
      'Active Listing': 'active_listing',
      'Under Contract': 'seller_under_contract',
      'Closed': null,
      'Nurture': null,
    };
    if(sellerMap.hasOwnProperty(s)) return sellerMap[s];
  }

  // Tenant/Landlord overrides — use rental protocols
  if(lead.type==='Tenant'){
    const tenantMap = {
      'New': 'new_tenant_lead',
      'Lead': 'new_tenant_lead',
      'Spoke With Lead': 'new_tenant_lead',
      'Spoke with Lead': 'new_tenant_lead',
      'Showing Rentals': 'tenant_showing',
      'Showing Homes': 'tenant_showing',
      'Application Submitted': 'tenant_application',
      'Lease Signed': null,
    };
    if(tenantMap.hasOwnProperty(s)) return tenantMap[s];
  }
  if(lead.type==='Landlord'){
    const landlordMap = {
      'New': 'new_landlord_lead',
      'Lead': 'new_landlord_lead',
      'Spoke With Lead': 'new_landlord_lead',
      'Spoke with Lead': 'new_landlord_lead',
      'Rental Evaluation': 'new_landlord_lead',
      'Active Rental Listing': 'landlord_listing',
      'Lease Signed': null,
    };
    if(landlordMap.hasOwnProperty(s)) return landlordMap[s];
  }

  const mappedProtocol = stageMap[s];
  if (mappedProtocol === null) return null;
  if((lead.type==='Tenant'||lead.type==='Landlord') && mappedProtocol==='just_closed') return null;
  return mappedProtocol || 'new_lead';
}

// Apply auto-assignment to a lead — returns updated lead fields or null if no change
function getAutoProtocolAssignment(lead, commHistory, transactions) {
  const protocolId = autoAssignProtocol(lead, commHistory, transactions);
  if (!protocolId) return null;
  if (lead.activeProtocolId === protocolId) return null; // already on this protocol

  // For lease_renewal, backdate protocolStartedAt to (close_date - 60 days)
  // so the protocol's day-offset logic surfaces the correct step based on time-to-expiry.
  let protocolStartedAt = new Date().toISOString();
  let protocolStep = 0;
  if (protocolId === 'lease_renewal' && Array.isArray(transactions)) {
    const leaseTx = transactions.find(t =>
      t.lead_id === lead.id &&
      (t.side === 'tenant' || t.side === 'landlord') &&
      t.close_date
    );
    if (leaseTx) {
      const startDate = new Date(leaseTx.close_date);
      startDate.setDate(startDate.getDate() - 60); // 60 days before lease expiry
      protocolStartedAt = startDate.toISOString();

      // Compute which step is currently active based on days elapsed since the backdated start.
      // Step i is active once we hit its dayOffset and before step i+1's dayOffset.
      const protocol = getProtocolById(protocolId);
      if (protocol) {
        const today = new Date();
        const daysElapsed = Math.floor((today - startDate) / (1000*60*60*24));
        let idx = 0;
        for (let i = 0; i < protocol.steps.length; i++) {
          if (daysElapsed >= protocol.steps[i].dayOffset) idx = i;
        }
        protocolStep = idx;
      }
    }
  }

  return {
    activeProtocolId: protocolId,
    protocolStep,
    protocolStartedAt,
  };
}

// Single source of truth passed into every AI call so all three features
// see the same picture of the lead and their transaction.
function buildLeadContext(lead, transaction, commHistory) {
  const ds = daysSince(lead.lastContact);
  const toured = (lead.touredProperties||[]).length;
  const lastProp = toured > 0 ? lead.touredProperties[toured-1]?.address : null;

  // Transaction snapshot (if one exists for this lead)
  let txContext = 'none';
  if (transaction) {
    const d = new Date();
    const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    const deadlines = [
      ['Deposit', transaction.deposit_due_date],
      ['Inspection Removal', transaction.inspection_removal_date],
      ['Appraisal Removal', transaction.appraisal_removal_date],
      ['Loan Removal', transaction.loan_removal_date],
      ['Close of Escrow', transaction.close_date],
    ].filter(([,d])=>d).map(([label,date])=>{
      const diff = Math.ceil((new Date(date)-new Date(today))/(1000*60*60*24));
      return label + ': ' + date + ' (' + (diff < 0 ? Math.abs(diff)+' days OVERDUE' : diff === 0 ? 'DUE TODAY' : 'in '+diff+' days') + ')';
    });
    const guideActions = (transaction.ai_guide?.what_to_do_now||[]);
    const checked = transaction.ai_checked || {};
    const pendingActions = guideActions.filter((_,i) => !checked[i]);
    const txUrgency = transaction.ai_guide?.next_reminder?.urgency || null;

    txContext = [
      'Status: ' + transaction.status,
      'Side: ' + transaction.side,
      'Purchase price: ' + (transaction.purchase_price || 'unknown'),
      'Close date: ' + (transaction.close_date || 'unknown'),
      deadlines.length ? 'Upcoming deadlines: ' + deadlines.join(' | ') : null,
      pendingActions.length ? 'Pending AI guide actions: ' + pendingActions.join(' | ') : null,
      txUrgency ? 'Transaction urgency level: ' + txUrgency : null,
      transaction.notes ? 'Transaction notes: ' + transaction.notes : null,
    ].filter(Boolean).join('\n- ');
  }

  // Previous AI outputs so new calls don't contradict them
  const prevNextStep = lead.nextStep || 'none';
  const prevAiGuide = transaction?.ai_guide?.current_step_title || null;
  const prevAiMessages = transaction?.ai_messages || null;

  // Rich history — all structured data Claude needs to stop guessing
  const appointmentHistory = (lead.appointments||[]).slice(0,8)
    .map(a => a.date + ' ' + a.type + (a.notes ? ': ' + a.notes : '')).join(' | ') || 'none';

  const touredHistory = (lead.touredProperties||[]).slice(0,8)
    .map(p => p.address + (p.notes ? ' (feedback: ' + p.notes + ')' : '') + (p.date ? ' on ' + p.date : '')).join(' | ') || 'none';

  const sharedHistory = (lead.propertiesShared||[]).slice(0,5)
    .map(p => p.address + (p.notes ? ' — ' + p.notes : '')).join(' | ') || 'none';

  const interestedList = (lead.interestedProperties||[]).slice(0,5)
    .map(p => p.address + (p.notes ? ' (' + p.notes + ')' : '')).join(' | ') || 'none';

  const documentList = (lead.documents||[]).map(d => d.name + ' (' + d.type + ')').join(', ') || 'none';

  // Recent communication history — primary AI signal for what's been done
  const recentComms = (commHistory||[]).slice(0,12).map(c => {
    const date = c.createdAt ? c.createdAt.slice(0,10) : '?';
    const statusLabel = {
      draft:'DRAFTED (not sent yet)',sent:'SENT',replied:'CLIENT REPLIED',
      no_answer:'NO ANSWER',voicemail:'LEFT VOICEMAIL',connected:'CALL CONNECTED',
      manual_note:'NOTE'
    }[c.status] || c.status;
    const parts = [`[${date}] ${c.channel.toUpperCase()} — ${statusLabel}`];
    if (c.subject) parts.push(`subject: "${c.subject}"`);
    if (c.summary) parts.push(`summary: ${c.summary}`);
    else if (c.body && c.channel !== 'call') parts.push(`body: ${c.body.slice(0,100)}`);
    return parts.join(' | ');
  }).join('\n') || 'none';

  return {
    // Core lead facts
    name: lead.name,
    firstName: lead.name.split(' ')[0],
    type: lead.type,
    stage: lead.stage,
    ds,
    // Human-readable label for AI prompts — distinguishes "fresh import" from a real number.
    dsLabel: ds === null ? 'never (just imported / no contact history yet)' : ds + ' days ago',
    notes: lead.notes,
    tags: (lead.tags||[]).join(', '),
    toured,
    lastProp,
    appointments: (lead.appointments||[]).length,
    completedSteps: (lead.completedSteps||[]).join(' | ') || 'none',
    activityLog: (lead.activityLog||[]).slice(0,10).map(e=>e.date+': '+e.text).join(' | ') || 'none',
    // Rich structured history
    appointmentHistory,
    touredHistory,
    sharedHistory,
    interestedList,
    documentList,
    // Transaction reality
    txContext,
    // What AI already said — so all three features stay consistent
    prevNextStep,
    prevAiGuide,
    prevAiMessages: prevAiMessages ? JSON.stringify(prevAiMessages).slice(0,300) : null,
    // Communication timeline history
    recentComms,
    // Active protocol
    activeProtocolId: lead.activeProtocolId||null,
    protocolStep: lead.protocolStep||0,
  };
}

  // Protocol context — if a protocol is active, use it to drive the suggestion
  const protocol = getProtocolById(lead.activeProtocolId);
  const protocolCtx = buildProtocolContext(lead, protocol, commHistory);
  const protocolSection = protocolCtx ? `

- Timing: ${protocolCtx.timingLabel}${protocolCtx.isOverdue?' — OVERDUE':''}${protocolCtx.isDueToday?' — DUE TODAY':''}

NO ACTIVE PROTOCOL — suggest based on stage and communication history.`;

  const prompt = `You are an expert real estate agent coach. Based on this lead's full situation — including their transaction if one exists — write ONE specific, actionable next step the agent should take TODAY or THIS WEEK.

LEAD:
- Name: ${ctx.name}

    }

    // ── SILENCE ESCALATION — fires across all stages ──────────────────────────
    // Use comms-based no-answer count passed in from TodayView
    const noRespAttempts = noAnswerCounts ? (noAnswerCounts[lead.id]||0) : 0;
    if(noRespAttempts>=3 && !['Closed','Nurture'].includes(s)){
      // Remove any existing task for this lead and replace with breakup escalation
      tasks.push({
        id:lead.id+'-breakup',leadId:lead.id,leadName:lead.name,leadType:lead.type,
        priority:'urgent',
        label:`${noRespAttempts}x no response — time for breakup message`,
        action:`${n} has not replied to ${noRespAttempts} outreach attempts. Stop chasing. Send a warm breakup message to release pressure — this often gets a response when nothing else does.`,
        stage:s,icon:'💔'
      });
    } else if(noRespAttempts===2 && !['Closed','Nurture'].includes(s)){
      tasks.push({
        id:lead.id+'-silence2',leadId:lead.id,leadName:lead.name,leadType:lead.type,
        priority:'today',
        label:'2x no response — try a different channel',
        action:`${n} hasn't responded to 2 attempts. Switch channel — if you called, try text. If you texted, try email. Reference something specific from your notes to show you know them.`,
        stage:s,icon:'🔄'
      });
    }
  });
  const order={critical:0,urgent:1,today:2,followup:3};
  const sorted = tasks.sort((a,b)=>order[a.priority]-order[b.priority]);
  // One card per lead — keep only the highest-priority task per leadId
  const seen = new Set();
  return sorted.filter(t => {
    if (seen.has(t.leadId)) return false;
    seen.add(t.leadId);
    return true;
  });
}

// Generate protocol-driven tasks for leads that have an active protocol
// Returns {protocolTasks, protocolLeadIds} so genTasks can skip those leads
function genProtocolTasks(leads, protocolComms, transactions) {
  const tasks = [];
  const protocolLeadIds = new Set();

  // Only process active leads — never show Closed or Nurture on Today
  const activeLeads = leads.filter(l => !['Closed','Nurture'].includes(l.stage));

  activeLeads.forEach(lead => {
    const commHistory = protocolComms[lead.id] || [];

    // Auto-assign protocol if none active — but DON'T save to DB here
    // Saving happens in markCommSent or when user takes action
    let effectiveLead = lead;
    if (!lead.activeProtocolId || !getProtocolById(lead.activeProtocolId)) {
      const assignment = getAutoProtocolAssignment(lead, commHistory, transactions);
      if (assignment) {
        effectiveLead = {...lead, ...assignment};
        // NOTE: We do NOT call dbSaveLead here — that would trigger on every render
        // Auto-assignment is applied visually; it persists when the agent takes an action
      }
    }

    const protocol = getProtocolById(effectiveLead.activeProtocolId);
    if (!protocol) return;
    const pCtx = buildProtocolContext(effectiveLead, protocol, commHistory);
    if (!pCtx) return; // protocol complete

    protocolLeadIds.add(effectiveLead.id);

    // Map protocol priority to task priority
    const priorityMap = {critical:'critical', urgent:'urgent', today:'today', followup:'followup'};
    const priority = priorityMap[pCtx.priority] || 'today';

    // Timing badge for the label
    const timingBadge = pCtx.isOverdue
      ? '⚠️ Overdue'
      : pCtx.isDueToday ? '🔴 Today'
      : pCtx.daysUntilDue <= 2 ? '🟡 Soon'
      : '📅 Upcoming';

    const CHAN_ICONS = {email:'✉️', sms:'💬', call:'📞', note:'📝'};

    tasks.push({
      id: effectiveLead.id+'-proto-'+pCtx.stepIdx,
      leadId: effectiveLead.id,
      leadName: effectiveLead.name,
      leadType: effectiveLead.type,
      priority,
      stage: effectiveLead.stage,
      icon: protocol.icon,
      // Protocol-specific fields
      isProtocol: true,
      protocolId: protocol.id,
      protocolName: protocol.name,
      protocolStep: pCtx.stepIdx,
      protocolTotal: pCtx.total,
      protocolChannel: pCtx.channel,
      protocolChannelIcon: CHAN_ICONS[pCtx.channel]||'📋',
      // Card display
      label: protocol.name + ' · Step '+(pCtx.stepIdx+1)+'/'+pCtx.total,
      action: pCtx.objective,
      timingBadge,
      draftText: pCtx.draft,
      stepAlreadyDone: pCtx.stepAlreadyDone,
      fallback: pCtx.fallback,
      aiInstruction: pCtx.aiInstruction,
    });
  });

  const order = {critical:0,urgent:1,today:2,followup:3};
  return {
    protocolTasks: tasks.sort((a,b)=>order[a.priority]-order[b.priority]),
    protocolLeadIds
  };
}

const DEAL_ORDER=['Under Contract','Active Listing','Active Rental Listing','Lease Signed','Buyer Rep Signed','Listing Agreement Signed','Application Submitted','Showing Homes','Showing Rentals','Touring Properties','Listing Appointment','Searching Deals','Rental Evaluation','Spoke With Lead','Spoke with Lead','New','Lead','Nurture','Closed'];
function getDealPath(leads, commsMap, transactions){
  const cm = commsMap || {};
  // Only leads in stages that represent real active deal progress toward closing.
  // Excludes New, Contacted, Spoke With Lead, Nurture, Closed — those aren't "close to closing"
  // and showing them here is misleading. They belong in the regular Today cards.
  const CLOSING_STAGES = new Set([
    'Under Contract',
    'Active Listing','Active Rental Listing',
    'Lease Signed',
    'Buyer Rep Signed','Listing Agreement Signed',
    'Application Submitted',
    'Showing Homes','Showing Rentals','Touring Properties',
    'Listing Appointment',
    'Searching Deals','Rental Evaluation',
  ]);
  return leads.filter(l => CLOSING_STAGES.has(l.stage))
    .sort((a,b)=>DEAL_ORDER.indexOf(a.stage)-DEAL_ORDER.indexOf(b.stage))
    .slice(0,4).map(l=>{
      // First: try to get the real next action from the lead's active protocol
      let effectiveLead = l;
      if(!l.activeProtocolId || !getProtocolById(l.activeProtocolId)){
        const assignment = getAutoProtocolAssignment(l, cm[l.id]||[], transactions);
        if(assignment) effectiveLead = {...l, ...assignment};
      }
      const protocol = getProtocolById(effectiveLead.activeProtocolId);
      const pCtx = protocol ? buildProtocolContext(effectiveLead, protocol, cm[l.id]||[]) : null;
      if(pCtx){
        const CHAN_ICONS = {email:'✉️', sms:'💬', call:'📞', note:'📝'};
        const icon = CHAN_ICONS[pCtx.channel] || '📋';
        const action = icon+' '+pCtx.objective;
        const cta = pCtx.channel==='call' ? 'Call Now'
                  : pCtx.channel==='sms'  ? 'Send Text'
                  : pCtx.channel==='email'? 'Send Email'
                  : 'Take Action';
        return {lead:l,action,cta,protocol,pCtx};
      }
      // Fallback: original stage-based copy if no protocol applies
      let action='',cta='';
      if(l.stage==='Under Contract'){action='Track deadlines — call today';cta='Call Now';}
      else if(l.stage.includes('Active')){action='Send weekly update';cta='Send Update';}
      else if(l.stage.includes('Signed')){action='Schedule next step';cta='Schedule';}
      else if(l.stage==='Application Submitted'){action='Follow up with landlord';cta='Follow Up';}
      else if(['Showing Homes','Showing Rentals','Touring Properties'].includes(l.stage)){action='Push toward offer or strategy session';cta='Push Forward';}
      else if(l.stage==='Listing Appointment'){action='Prep CMA — win the listing';cta='Prep Now';}
      else if(l.stage==='Spoke With Lead'){action='Lock in appointment';cta='Set Appt';}
      else{action='Call — find Big Why, set appointment';cta='Call Now';}
      return {lead:l,action,cta,protocol:null,pCtx:null};
    });
}

const OBJECTIONS={
  ghosting:{title:"They went quiet — use this",script:"Hey — just checking, are you still serious about moving or just browsing right now? Either way is fine, I just want to make sure I am focused on the right things for you."},
  unsigned:{title:"Agreement not signed — use this",script:"Hey [Name]! Quick question — is there anything in the agreement that does not feel right? Happy to walk through it. I want to make sure we are locked in before the right home comes up."},
  deciding:{title:"Cannot make a decision — use this",script:"Totally normal to feel that way. What would need to be true for you to feel 100% ready? I want to make sure we get there together."},
  stale:{title:"Listing sitting too long — use this",script:"I want to be straight with you — the market is telling us something. The fastest way to get you what you want is a price adjustment this week. Can we talk numbers?"},
};
function getObjForStage(stage,ds){
  if(ds>=5)return OBJECTIONS.ghosting;
  if((stage==='Buyer Rep Signed'||stage==='Listing Agreement Signed')&&ds>=3)return OBJECTIONS.unsigned;
  if(stage==='Active Listing'&&ds>=14)return OBJECTIONS.stale;
  if(stage==='Showing Homes'&&ds>=7)return OBJECTIONS.deciding;
  return null;
}

function PipeTracker({leads,onFilter}){
  const [act,setAct]=useState(null);
  const cnts=useMemo(()=>{
    const c={};PIPE.forEach(s=>c[s.key]=0);
    leads.forEach(l=>{if(l.stage==='Nurture')return;const k=getPK(l.stage);c[k]=(c[k]||0)+1;});
    return c;
  },[leads]);
  const tog=(key,cnt)=>{if(!cnt)return;const n=act===key?null:key;setAct(n);onFilter(n);};
  // Compute conversion % between adjacent stages
  const keys=PIPE.map(s=>s.key);
  const conv=keys.map((k,i)=>{
    if(i===0)return null;
    const prev=cnts[keys[i-1]]||0;
    const cur=cnts[k]||0;
    if(!prev)return null;
    return Math.round((cur/prev)*100)+'%';
  });
  // Color palette matching the image: dark blue → blue → orange → gold → green → dark green
  const colors=['#1e3a8a','#2563eb','#f97316','#f59e0b','#16a34a','#1a6b4a'];
  return React.createElement('div',{className:'pipe'},
    React.createElement('div',{className:'pipe-ttl'},'🔥 Deal Pipeline Tracker — click any stage to filter'),
    React.createElement('div',{className:'pipe-track'},
      ...PIPE.map((seg,i)=>{
        const cnt=cnts[seg.key]||0;
        const color=colors[i]||seg.color;
        const isLast=i===PIPE.length-1;
        return React.createElement('div',{key:seg.key,className:`ps${!cnt?' ps-empty':''}${act===seg.key?' ps-on':''}`,
          onClick:()=>tog(seg.key,cnt)
        },
          React.createElement('div',{className:'ps-arrow',style:{background:color,marginLeft:i>0?'-14px':'0',zIndex:PIPE.length-i}},
            React.createElement('span',{className:'ps-lbl'},seg.label),
            React.createElement('span',{className:'ps-cnt'},cnt),
            React.createElement('span',{className:'ps-unit'},cnt===1?'Deal':'Deals'),
            isLast&&React.createElement('div',{className:'ps-finish'})
          ),
          i>0&&React.createElement('div',{className:'ps-meta'},
            null
          )
        );
      })
    ),
    React.createElement('div',{className:'pipe-ft'},
      React.createElement('span',{className:'pipe-hint'},'Showing '+leads.filter(l=>l.stage!=='Nurture').length+' active leads across pipeline'),
      act&&React.createElement('button',{className:'pipe-clr',onClick:()=>{setAct(null);onFilter(null);}},'✕ Clear filter')
    )
  );
}

  const d = new Date();
  const todayStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  const TODAY_KEY = 'agentos_today_' + todayStr;

  // ── STATE ──────────────────────────────────────────────────────────────────
  // Completed cards for today. Stored in localStorage so they stay disappeared
  // even after a page reload — matches the design rule that once you do the
  // suggested action, the card is gone for the rest of the day.
  const [done, setDone] = useState(()=>{
    try { const s=localStorage.getItem(TODAY_KEY); return s?JSON.parse(s):[]; } catch(e){return [];}
  });
  const [copied, setCopied] = useState(null);
  const [generating, setGenerating] = useState(null);
  const [aiContent, setAiContent] = useState({});
  const [editedContent, setEditedContent] = useState({});
  const [openCard, setOpenCard] = useState(null);
  const [activeTab, setActiveTab] = useState({});
  const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);
  const [commsMap, setCommsMap] = useState({});
  const [commsLoaded, setCommsLoaded] = useState(false);

  // ── AI TRIAGE STATE ─────────────────────────────────────────────────────────
  // The smart AI agent decides what's on Today for REAL leads only.
  // Demo leads keep using the rule-based protocol matcher (so anyone testing
  // the app sees the polished pre-built experience). Real leads get the AI.
  //
  // triageMap: { leadId -> {decision, reason, priority, channel, task, draftText, ...} }
  // triageLoaded: have we ever run today (or restored from cache)?
  // triageRunning: is a triage call in flight right now?
  // triageError: last error message if a run failed, so we can surface it
  // ── AI TRIAGE STATE ─────────────────────────────────────────────────────────
  // The smart AI agent decides what's on Today for REAL leads only.
  // Demo leads keep using the rule-based protocol matcher (so anyone testing
  // the app sees the polished pre-built experience). Real leads get the AI.
  //
  // CACHE KEY DESIGN: must be STABLE on first mount, before window._AGENT may have
  // loaded. We use Supabase auth user.id (loaded asynchronously, then cached in a ref
  // so the key is stable across renders). Format: `agntai_triage_${YYYY-MM-DD}_${userId}`
  //
  // triageMap: { leadId -> {decision, ...} }            — today's results
  // triagePreviousMap: yesterday's results, shown faded while today runs
  // triageTimestamp: when today's cache was last written (for "Last refreshed" banner)
  // triageReady: false until we've checked localStorage. Prevents premature runs.
  // triageLoaded: true once we have today's results
  // triageRunning: is a triage call in flight right now?
  // triageError: last error message if a run failed
  const triageKeyRef = React.useRef(null);
  const triageUidRef = React.useRef(null);
  const [triageMap, setTriageMap] = useState({});
  const [triagePreviousMap, setTriagePreviousMap] = useState({});
  const [triageTimestamp, setTriageTimestamp] = useState(null);
  const [triageReady, setTriageReady] = useState(false);
  const [triageLoaded, setTriageLoaded] = useState(false);
  const [triageRunning, setTriageRunning] = useState(false);
  const [triageError, setTriageError] = useState(null);
  const [showTriageDebug, setShowTriageDebug] = useState(false);

  // ── MORNING SCAN STATE ─────────────────────────────────────────────────────
  // Runs once per day. Reads today + next 2 days of unified calendar items and
  // produces a digest. Cached separately from triage (different cache key) so it
  // can run independently and be refreshed on its own.
  const [morningScan, setMorningScan] = useState(null);
  const [morningScanLoaded, setMorningScanLoaded] = useState(false);
  const [morningScanRunning, setMorningScanRunning] = useState(false);
  const morningScanKeyRef = React.useRef(null);

  // Resolve the cache key once on mount: read Supabase user id (stable, available
  // because we're past login), build key, check localStorage for both today's cache
  // and yesterday's cache (used as the faded fallback while today is running).
  // Cache format: { byLeadId: {...}, timestamp: ISO }
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const { data:{ user } } = await db.auth.getUser();
        const uid = (user && user.id) || 'guest';
        const d = new Date();
        const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        const yd = new Date(Date.now() - 86400000);
        const yesterday = yd.getFullYear() + '-' + String(yd.getMonth() + 1).padStart(2, '0') + '-' + String(yd.getDate()).padStart(2, '0');
        const key = `agntai_triage_${today}_${uid}`;
        const yKey = `agntai_triage_${yesterday}_${uid}`;
        if(cancelled) return;
        triageKeyRef.current = key;
        triageUidRef.current = uid;
        // Try to read TODAY'S cache
        let foundToday = false;
        try {
          const cached = localStorage.getItem(key);
          if(cached) {
            const parsed = JSON.parse(cached);
            // New envelope format
            if(parsed && typeof parsed === 'object' && parsed.byLeadId) {
              setTriageMap(parsed.byLeadId);
              setTriageTimestamp(parsed.timestamp || null);
            } else {
              // Legacy format — just the byLeadId object
              setTriageMap(parsed);
            }
            setTriageLoaded(true);
            foundToday = true;
          }
        } catch(e) {}
        // If today's cache is missing, try YESTERDAY'S so we can show it faded
        // while today's run is happening. Without this, the page would be blank.
        if(!foundToday) {
          try {
            const yCached = localStorage.getItem(yKey);
            if(yCached) {
              const yParsed = JSON.parse(yCached);
              if(yParsed && typeof yParsed === 'object' && yParsed.byLeadId) {
                setTriagePreviousMap(yParsed.byLeadId);
              } else {
                setTriagePreviousMap(yParsed);
              }
            }
          } catch(e) {}
        }
        // Cleanup happens later (after today's run completes), not here, so we
        // don't accidentally wipe yesterday's cache before reading it.
        setTriageReady(true);
      } catch(e) {
        const d = new Date();
        const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        triageKeyRef.current = `agntai_triage_${today}_anon`;
        triageUidRef.current = 'anon';
        setTriageReady(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // ── MORNING SCAN: load cache + auto-run once per day ───────────────────────
  // Cache key is per-user, per-day. We read on mount; if today's scan exists
  // we restore it, otherwise we run a fresh scan after triage's key resolves.
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const { data:{ user } } = await db.auth.getUser();
        const uid = (user && user.id) || 'guest';
        const d = new Date();
        const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        const key = `agntai_morning_${today}_${uid}`;
        if(cancelled) return;
        morningScanKeyRef.current = key;
        try {
          const cached = localStorage.getItem(key);
          if(cached) {
            const parsed = JSON.parse(cached);
            if(parsed) {
              setMorningScan(parsed);
              setMorningScanLoaded(true);
            }
          }
        } catch(e) {}
        // Clean older days' caches
        try {
          const prefix = `agntai_morning_`;
          for(let i = localStorage.length - 1; i >= 0; i--) {
            const k = localStorage.key(i);
            if(k && k.startsWith(prefix) && k !== key) localStorage.removeItem(k);
          }
        } catch(e) {}
      } catch(e) {
        const d = new Date();
        const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        morningScanKeyRef.current = `agntai_morning_${today}_anon`;
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const runMorningScanNow = React.useCallback(async () => {
    if(!morningScanKeyRef.current) return;
    setMorningScanRunning(true);
    try {
      const result = await runMorningScan(leads||[], transactions||[]);
      setMorningScan(result);
      setMorningScanLoaded(true);
      try { localStorage.setItem(morningScanKeyRef.current, JSON.stringify(result)); } catch(e) {}
    } catch(e) {
      console.error('Morning scan failed:', e);
    } finally {
      setMorningScanRunning(false);
    }
  }, [leads, transactions]);

  // Auto-run morning scan once per day, after leads load. We deliberately don't
  // gate this on triage — they're independent.
  React.useEffect(() => {
    if(!morningScanKeyRef.current) return;
    if(!leads || !leads.length) return;
    if(morningScanLoaded) return;
    if(morningScanRunning) return;
    runMorningScanNow();
  }, [leads, transactions, morningScanLoaded, morningScanRunning, runMorningScanNow]);

  // When leads change (e.g. agent just confirmed a date popup that created a
  // new scheduled task), invalidate the morning scan cache so it re-runs and
  // reflects the new commitments in Today's schedule.
  React.useEffect(() => {
    const handler = () => {
      try {
        if(morningScanKeyRef.current) localStorage.removeItem(morningScanKeyRef.current);
      } catch(e) {}
      setMorningScanLoaded(false);
    };
    window.addEventListener('leads-changed', handler);
    return () => window.removeEventListener('leads-changed', handler);
  }, []);


  const runTriage = React.useCallback(async () => {
    if(!leads || !leads.length) return;
    if(!triageKeyRef.current) return; // wait for key to resolve
    setTriageRunning(true);
    setTriageError(null);
    try {
      const realLeads = leads.filter(l => !l.isDemo);
      const now = new Date().toISOString();
      if(!realLeads.length) {
        const envelope = { byLeadId: {}, timestamp: now };
        setTriageMap({});
        setTriageTimestamp(now);
        try { localStorage.setItem(triageKeyRef.current, JSON.stringify(envelope)); } catch(e) {}
        setTriageLoaded(true);
        setTriagePreviousMap({});
        setTriageRunning(false);
        return;
      }
      // Use current map (if any) as the baseline for skip-unchanged. This covers
      // both "Re-think today" within the same day (reuse today's decisions for
      // unchanged leads) and the daily auto-run (which seeded triageMap from
      // yesterday's cache via triagePreviousMap → here we promote it to baseline).
      const baseline = (triageMap && Object.keys(triageMap).length)
        ? triageMap
        : triagePreviousMap;
      const result = await runDailyTriage(realLeads, transactions||[], {
        previousDecisions: baseline,
      });
      const envelope = { byLeadId: result.byLeadId, timestamp: now };
      setTriageMap(result.byLeadId);
      setTriageTimestamp(now);
      try { localStorage.setItem(triageKeyRef.current, JSON.stringify(envelope)); } catch(e) {}
      setTriageLoaded(true);
      setTriagePreviousMap({}); // no longer needed — today is loaded
      // Clean up old days' caches now that today's run succeeded (so we don't
      // wipe yesterday's cache before reading it earlier in the mount effect)
      try {
        const prefix = `agntai_triage_`;
        const uid = triageUidRef.current;
        const userSuffix = uid ? `_${uid}` : null;
        for(let i = localStorage.length - 1; i >= 0; i--) {
          const k = localStorage.key(i);
          if(k && k.startsWith(prefix) && (!userSuffix || k.endsWith(userSuffix)) && k !== triageKeyRef.current) {
            localStorage.removeItem(k);
          }
        }
      } catch(e) {}
    } catch(e) {
      console.error('Triage run failed:', e);
      setTriageError(e.message || 'AI triage failed — using fallback tasks');
      setTriageLoaded(true); // we tried; allow fallback rendering
    } finally {
      setTriageRunning(false);
    }
  }, [leads, transactions, triageMap, triagePreviousMap]);

  // Auto-run once per day. Conditions:
  //   • Cache check completed (triageReady)
  //   • Leads loaded
  //   • No cache for today found (triageLoaded would be true if so)
  //   • Not already running
  React.useEffect(() => {
    if(!triageReady) return;     // wait for cache check
    if(!leads || !leads.length) return;
    if(triageLoaded) return;     // already have today's results
    if(triageRunning) return;
    const realCount = leads.filter(l => !l.isDemo).length;
    if(realCount === 0) {
      setTriageLoaded(true);
      return;
    }
    runTriage();
  }, [triageReady, leads, triageLoaded, triageRunning, runTriage]);

  // When triage returns "action" decisions with drafts, pre-populate aiContent so
  // the card shows the AI's draft immediately (no need to click ✨ AI Write again).
  React.useEffect(() => {
    const updates = {};
    Object.values(triageMap).forEach(decision => {
      if(decision.decision !== 'action' || !decision.draftText) return;
      const taskId = decision.leadId + '-ai';
      if(aiContent[taskId]) return; // already set
      // Build a minimal ai object that matches the shape the card expects
      const ch = decision.channel || 'sms';
      const draftAi = {};
      if(ch === 'sms') {
        draftAi.text = decision.draftText;
      } else if(ch === 'email') {
        draftAi.email_subject = decision.subject || 'Following up';
        draftAi.email_body = decision.draftText;
      } else if(ch === 'call') {
        draftAi.call_script = decision.draftText;
      }
      updates[taskId] = draftAi;
    });
    if(Object.keys(updates).length) {
      setAiContent(prev => ({...prev, ...updates}));
    }
  }, [triageMap]);

  // ── MORNING RESET ──────────────────────────────────────────────────────────
  React.useEffect(()=>{
    try{Object.keys(localStorage).forEach(k=>{if(k.startsWith('agentos_today_')&&k!==TODAY_KEY)localStorage.removeItem(k);});}catch(e){}
  },[]);
  React.useEffect(()=>{try{localStorage.setItem(TODAY_KEY,JSON.stringify(done));}catch(e){};},[done]);

  // ── BATCHED COMMS LOADING (10 at a time) ───────────────────────────────────
  const loadCommsInBatches = React.useCallback(async(leadsToLoad)=>{
    if(!leadsToLoad||!leadsToLoad.length)return;
    const BATCH=10;
    for(let i=0;i<leadsToLoad.length;i+=BATCH){
      const batch=leadsToLoad.slice(i,i+BATCH);
      const results=await Promise.all(batch.map(l=>dbLoadCommunications(l.id)));
      const chunk={};
      batch.forEach((l,idx)=>{chunk[l.id]=results[idx]||[];});
      setCommsMap(prev=>({...prev,...chunk}));
    }
    setCommsLoaded(true);
  },[]);

  React.useEffect(()=>{
    if(!leads||!leads.length)return;
    const activeLeads=leads.filter(l=>!['Closed','Nurture'].includes(l.stage));
    setCommsLoaded(false);
    loadCommsInBatches(activeLeads);
  },[leads]);

  const refreshCommsForLead=React.useCallback(async(leadId)=>{
    const data=await dbLoadCommunications(leadId);
    setCommsMap(prev=>({...prev,[leadId]:data}));
  },[]);

  React.useEffect(()=>{
    const onFocus=()=>{
      if(!leads||!leads.length)return;
      loadCommsInBatches(leads.filter(l=>!['Closed','Nurture'].includes(l.stage)));
    };
    window.addEventListener('focus',onFocus);
    return()=>window.removeEventListener('focus',onFocus);
  },[leads,loadCommsInBatches]);

  // ── TASK GENERATION ────────────────────────────────────────────────────────
  const allTasks=useMemo(()=>{
    const{protocolTasks}=genProtocolTasks(leads,commsMap,transactions);
    const protocolByLead = {};
    protocolTasks.forEach(t => { protocolByLead[t.leadId] = t; });
    // Build the final list lead-by-lead. For demo leads we always use the protocol task.
    // For real leads we check the triage decision (if we have one).
    const finalTasks = [];
    const leadById = {};
    leads.forEach(l => { leadById[l.id] = l; });
    const d=new Date();
    const todayStr=d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

    // First pass: apply triage decisions for real leads
    const handledLeadIds = new Set();
    leads.forEach(lead => {
      if(done.includes(lead.id)) { handledLeadIds.add(lead.id); return; }
      // Demo leads: always use rule-based
      if(lead.isDemo) {
        const t = protocolByLead[lead.id];
        if(t) finalTasks.push(t);
        handledLeadIds.add(lead.id);
        return;
      }
      // Real leads: honor triage decision if we have one
      const todayDecision = triageMap[lead.id];
      const yesterdayDecision = triagePreviousMap[lead.id];
      const decision = todayDecision || yesterdayDecision;
      // If decision came from yesterday's cache (because today is still loading),
      // mark the resulting task as faded so the UI can dim it visually.
      const isFaded = !todayDecision && !!yesterdayDecision;
      if(!decision) {
        // No decision for this lead in today's or yesterday's cache.
        // - If triage is still running (or hasn't run yet), hide the lead from Today.
        //   We don't want to show stale rule-based cards while the AI is thinking.
        // - If triage finished but this specific lead got no decision (rare, e.g. AI
        //   skipped it in the batch), fall back to rule-based so we don't lose visibility.
        if(triageRunning || !triageLoaded) {
          handledLeadIds.add(lead.id);
          return;
        }
        // Triage finished but no decision returned — only then fall back
        if(triageError) {
          const t = protocolByLead[lead.id];
          if(t) finalTasks.push(t);
        }
        handledLeadIds.add(lead.id);
        return;
      }
      if(decision.decision === 'skip') {
        // AI says skip — don't show this lead on Today
        handledLeadIds.add(lead.id);
        return;
      }
      if(decision.decision === 'confirm') {
        // AI needs the agent to fill in info — show a confirm card
        finalTasks.push({
          id: lead.id + '-confirm',
          leadId: lead.id,
          leadName: lead.name,
          leadType: lead.type,
          priority: 'today',
          stage: lead.stage,
          icon: '❓',
          label: 'Need your input',
          action: decision.confirmQuestion || 'Did this lead reply yet?',
          isConfirm: true,
          isFaded,
          confirmQuestion: decision.confirmQuestion,
          originalCommId: decision.originalCommId,
          followUpDraft: decision.followUpDraft,
          reason: decision.reason,
        });
        handledLeadIds.add(lead.id);
        return;
      }
      if(decision.decision === 'action') {
        // AI suggests a specific action — build a task from it
        const prio = decision.priority || 'today';
        const ch = decision.channel || 'sms';
        const iconByCh = {sms:'💬', email:'✉️', call:'📞', note:'📝'};
        const iconByPrio = {critical:'🔴', urgent:'🟠', today:'🟡', followup:'🟢'};
        finalTasks.push({
          id: lead.id + '-ai',
          leadId: lead.id,
          leadName: lead.name,
          leadType: lead.type,
          priority: prio,
          stage: lead.stage,
          icon: iconByCh[ch] || iconByPrio[prio] || '✨',
          label: decision.task || 'AI suggestion',
          action: decision.reason || decision.task || '',
          isAI: true,
          isFaded,
          aiChannel: ch,
          aiDraft: decision.draftText || '',
          aiSubject: decision.subject || '',
          aiWhy: decision.why || decision.reason || '',
        });
        handledLeadIds.add(lead.id);
        return;
      }
      // Unknown decision shape — fall back to rule-based
      const t = protocolByLead[lead.id];
      if(t) finalTasks.push(t);
      handledLeadIds.add(lead.id);
    });

    // Add lease expiry tasks for active leases within 30 days
    (transactions||[]).forEach(tx=>{
      if(tx.status==='closed') return;
      const isLease=tx.side==='tenant'||tx.side==='landlord';
      if(!isLease||!tx.close_date) return;
      const lead=leads.find(l=>l.id===tx.lead_id);
      if(!lead||!tx.lead_id) return;
      if(done.includes(lead.id)) return;
      // Don't dup if we already have a task for this lead
      if(finalTasks.some(t => t.leadId === lead.id)) return;
      const leaseEndDiff=Math.ceil((new Date(tx.close_date)-new Date(todayStr))/(1000*60*60*24));
      if(leaseEndDiff>30||leaseEndDiff<-30) return;
      const priority=leaseEndDiff<=0?'critical':leaseEndDiff<=14?'urgent':leaseEndDiff<=30?'today':'followup';
      const action=leaseEndDiff<0
        ?`Lease expired ${Math.abs(leaseEndDiff)} days ago — find out if ${lead.name.split(' ')[0]} needs help finding a new place`
        :leaseEndDiff===0
        ?`Lease expires TODAY — call ${lead.name.split(' ')[0]} now to find out their plans`
        :`Lease expires in ${leaseEndDiff} days — reach out now to find out if they're renewing or moving`;
      finalTasks.push({
        id:tx.id+'-lease-expiry',
        leadId:lead.id,
        leadName:lead.name,
        leadType:lead.type,
        priority,
        stage:lead.stage,
        icon:'🔄',
        label:'Lease Expiry — '+new Date(tx.close_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
        action,
        isProtocol:false,
        protocolChannel:'sms',
        draftText:`Hey ${lead.name.split(' ')[0]}! Your lease is coming up on ${new Date(tx.close_date).toLocaleDateString('en-US',{month:'short',day:'numeric'})} — are you thinking about renewing, or would you like help finding your next place? Happy to help either way! 😊`,
        timingBadge:leaseEndDiff<=0?'🔴 Overdue':leaseEndDiff<=14?'🔴 Urgent':'🟡 Due Soon',
      });
    });

    const order={critical:0,urgent:1,today:2,followup:3};
    return finalTasks.sort((a,b)=>(order[a.priority]??99)-(order[b.priority]??99));
  },[leads,commsMap,done,transactions,triageMap,triagePreviousMap,triageRunning,triageLoaded,triageError]);

  const visibleTasks=useMemo(()=>allTasks.slice(0,visibleCount),[allTasks,visibleCount]);
  const remainingCount=allTasks.length-visibleTasks.length;

  const noAnswerCounts=useMemo(()=>{
    const c={};
    Object.entries(commsMap).forEach(([lid,comms])=>{c[lid]=comms.filter(x=>x.status==='no_answer'||x.status==='voicemail').length;});
    return c;
  },[commsMap]);

  const dealPath=useMemo(()=>getDealPath(leads,commsMap,transactions),[leads,commsMap,transactions]);
  const doneCount=done.length;
  const dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const today2str=todayStr;

  // ── TRANSACTIONS ───────────────────────────────────────────────────────────
  const txCards=useMemo(()=>(transactions||[]).map(tx=>{
    const lead=leads.find(l=>l.id===tx.lead_id);
    const checked=tx.ai_checked||{};
    const unchecked=(tx.ai_guide?.what_to_do_now||[]).filter((_,i)=>!checked[i]);
    const txTotal=(tx.ai_guide?.what_to_do_now||[]).length;
    const txDone=txTotal-unchecked.length;
    const deadlines=['deposit_due_date','inspection_removal_date','appraisal_removal_date','loan_removal_date','close_date'].map((f,fi)=>({label:['Deposit','Inspection','Appraisal','Loan','Close'][fi],date:tx[f]})).filter(x=>x.date).map(x=>({...x,diff:Math.ceil((new Date(x.date)-new Date(today2str))/(1000*60*60*24))})).sort((a,b)=>a.diff-b.diff);
    // Lease expiry — show reminder at 60 days so agent has time to act
    const isLease=(tx.side==='tenant'||tx.side==='landlord');
    if(isLease&&tx.close_date){
      const leaseEndDiff=Math.ceil((new Date(tx.close_date)-new Date(today2str))/(1000*60*60*24));
      if(leaseEndDiff<0){
        return{tx,lead,urgency:'overdue',message:'Lease expired '+Math.abs(leaseEndDiff)+'d ago — follow up immediately',done:txDone,total:txTotal};
      } else if(leaseEndDiff===0){
        return{tx,lead,urgency:'today',message:'Lease expires TODAY — contact now',done:txDone,total:txTotal};
      } else if(leaseEndDiff<=30){
        // Auto-assign lease renewal protocol to the lead if not already on it
        if(lead&&lead.activeProtocolId!=='lease_renewal'){
          setTimeout(()=>{
            const updatedLead={...lead,activeProtocolId:'lease_renewal',protocolStep:2,protocolStartedAt:new Date().toISOString()};
            // Will be picked up by Today page protocol tasks
          },0);
        }

// Build an email URL based on the user's preferred handler.
// 'gmail_web' → Gmail compose URL (works for any Google account, opens in new tab cleanly)
// 'system_mail' → mailto: (uses whatever the OS/browser is set up for — Apple Mail, Outlook, etc)
function buildEmailUrl(toEmail, subject, body){
  const meta = window._AGENT_META || {};
  const handler = meta.email_handler || 'gmail_web'; // default to Gmail web
  if(handler === 'gmail_web'){
    // Gmail compose URL — opens https://mail.google.com/mail/?view=cm&fs=1&to=...
    return 'https://mail.google.com/mail/?view=cm&fs=1&to='+encodeURIComponent(toEmail||'')+
      '&su='+encodeURIComponent(subject||'')+
      '&body='+encodeURIComponent(body||'');
  }
  // mailto: fallback
  return 'mailto:'+(toEmail||'')+'?subject='+encodeURIComponent(subject||'')+'&body='+encodeURIComponent(body||'');
}

// Open a protocol URL (mailto:, sms:, tel:) without breaking the current page.
// Setting window.location.href = 'mailto:...' causes Chrome on Mac (and some others)
// to navigate the current tab to the mailto URL, leaving a blank page after the
// email handler opens. Programmatically clicking an anchor with target="_blank"
// avoids this — the protocol handler takes over and the original page stays intact.
function openProtocolUrl(url){
  if(!url) return;
  try {
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noreferrer';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ try { document.body.removeChild(a); } catch(e){} }, 100);
  } catch(e) {
    // Fallback if anchor click fails for any reason
    window.location.href = url;
  }
}

// ── IMPORT PARSER ─────────────────────────────────────────────────────────────
// Field definitions: which fields the app cares about, plus aliases used for auto-detect.
// Auto-detect tries exact match first, then "contains" match, so weird header names like
// "Client Full Name" or "Mobile #" still get picked up — but the user can always override
// in the mapping step.
const IMPORT_FIELDS = [
  // Name fields — at least ONE of firstName / lastName / fullName must be mapped.
  // If both first + last are mapped, we combine them. Otherwise we use whichever one is set.
  {key:'firstName', label:'First Name', group:'name', aliases:['first name','firstname','first','given name','givenname']},
  {key:'lastName',  label:'Last Name',  group:'name', aliases:['last name','lastname','last','surname','family name','familyname']},
  {key:'fullName',  label:'Full Name',  group:'name', aliases:['full name','fullname','name','client','contact','contactname','clientname','client name','contact name']},
  {key:'email',     label:'Email',      required:false, aliases:['email','emailaddress','email address','e-mail','mail','primary email','email 1']},
  {key:'phone',     label:'Phone',      required:false, aliases:['phone','phonenumber','phone number','mobile','mobile #','cell','cellphone','cell phone','telephone','tel','primary phone','phone 1']},
  {key:'type',      label:'Type',       required:false, aliases:['type','leadtype','lead type','category','role']},
  {key:'stage',     label:'Stage',      required:false, aliases:['stage','status','pipeline']},
  {key:'source',    label:'Source',     required:false, aliases:['source','leadsource','lead source','origin','referredby','referred by']},
  {key:'tags',      label:'Tags',       required:false, aliases:['tags','tag','labels','label','keywords']},
  // Notes is multi: user can map several spreadsheet columns and we'll concatenate.
  // We track the primary "Notes" column here, and also support Background as a separate
  // field that gets folded into notes with a label.
  {key:'notes',      label:'Notes',      required:false, multi:true, aliases:['notes','note','comments','comment','remarks']},
  {key:'background', label:'Background', required:false, aliases:['background','bio','description','about','details','summary']},
];

const VALID_TYPES = ['Buyer','Seller','Tenant','Landlord','Investor'];

// Normalize a phone number to a clean display format. Keeps + for international.
function normalizePhone(raw){
  if(!raw) return '';
  const s = String(raw).trim();
  if(!s) return '';
  const hasPlus = s.startsWith('+');
  const digits = s.replace(/\D/g,'');
  if(!digits) return '';
  // US 10-digit
  if(!hasPlus && digits.length===10) return '('+digits.slice(0,3)+') '+digits.slice(3,6)+'-'+digits.slice(6);
  // US 11-digit starting with 1
  if(!hasPlus && digits.length===11 && digits[0]==='1') return '('+digits.slice(1,4)+') '+digits.slice(4,7)+'-'+digits.slice(7);
  // International or unusual length — preserve +
  return hasPlus ? '+'+digits : digits;
}

// Match user types loosely. "buyer", "BUYER", "Buyers", "buying" → "Buyer".
function normalizeType(raw){
  if(!raw) return 'Buyer';
  const s = String(raw).toLowerCase().trim();
  for(const t of VALID_TYPES){ if(s.startsWith(t.toLowerCase())) return t; }
  if(s.includes('buy')) return 'Buyer';
  if(s.includes('sell')) return 'Seller';
  if(s.includes('rent') || s.includes('tenant')) return 'Tenant';
  if(s.includes('landlord') || s.includes('owner')) return 'Landlord';
  if(s.includes('invest')) return 'Investor';
  return 'Buyer';
}

// Look at actual cell values in a column and guess what type of data it contains.
// Returns one of: 'email', 'phone', 'name', 'fullName', 'firstName', 'lastName', or null.
// Uses majority-vote: if >=50% of non-empty cells in a column match a pattern, that's the type.
function detectColumnContent(values){
  const samples = values.filter(v => String(v||'').trim()!=='').slice(0, 30); // sample up to 30 non-empty values
  if(samples.length === 0) return null;

  const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  // Phone: at least 7 digits, mostly digits/spaces/() / + / -
  const phoneLikeRx = /^[\d\s().+\-]{7,}$/;
  // A "name-like" cell: 1-4 words, mostly letters (allow apostrophes, hyphens, dots, accents), no @ or digits
  const namePartRx = /^[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ'.\-]*$/;

  let emails = 0, phones = 0, fullNames = 0, singleNames = 0;
  for(const raw of samples){
    const v = String(raw).trim();
    if(emailRx.test(v)) { emails++; continue; }
    if(phoneLikeRx.test(v) && v.replace(/\D/g,'').length>=7){ phones++; continue; }
    // Name detection
    const words = v.split(/\s+/).filter(Boolean);
    if(words.length>=2 && words.length<=4 && words.every(w=>namePartRx.test(w))){
      fullNames++;
    } else if(words.length===1 && namePartRx.test(words[0]) && words[0].length>=2){
      singleNames++;
    }
  }
  const n = samples.length;
  const half = Math.ceil(n/2);
  if(emails >= half) return 'email';
  if(phones >= half) return 'phone';
  if(fullNames >= half) return 'fullName';
  if(singleNames >= half) return 'firstOrLastName'; // ambiguous — could be either
  return null;
}

// Auto-suggest a mapping. First tries header names; for any unmapped fields,
// falls back to looking at the actual data in each column.
function autoMapHeaders(headers, rows){
  const map = {};
  const used = new Set();
  const norm = h => String(h||'').toLowerCase().trim().replace(/[_\-]/g,' ').replace(/\s+/g,' ');
  const normedHeaders = headers.map(norm);

  // Treat synthetic "Column N" and "(unnamed)" headers as effectively empty for matching.
  // This fixes a bug where "(unnamed)" was matching fullName via the substring "name".
  const isSyntheticHeader = h => !h || /^column\s*\d+$/i.test(h) || h === '(unnamed)';

  // Pass 1: header name matching (skip synthetic headers)
  for(const f of IMPORT_FIELDS){
    if(f.multi){
      // Multi-mappable field: collect ALL columns whose header matches any alias.
      // E.g. for notes, grab both "Notes" and "Comments" if both exist.
      const matched = [];
      for(let i=0; i<normedHeaders.length; i++){
        if(used.has(i) || isSyntheticHeader(headers[i])) continue;
        const h = normedHeaders[i];
        if(!h) continue;
        const hit = f.aliases.some(a => {
          const na = norm(a);
          return h===na || h.includes(na);
        });
        if(hit){ matched.push(i); }
      }
      if(matched.length){
        map[f.key] = matched.map(i => headers[i]);
        matched.forEach(i => used.add(i));
      }
    } else {
      let idx = -1;
      // exact match first
      for(const a of f.aliases){
        const na = norm(a);
        idx = normedHeaders.findIndex((h,i)=>!used.has(i) && !isSyntheticHeader(headers[i]) && h===na);
        if(idx>=0) break;
      }
      // then contains
      if(idx<0){
        for(const a of f.aliases){
          const na = norm(a);
          idx = normedHeaders.findIndex((h,i)=>!used.has(i) && !isSyntheticHeader(headers[i]) && h && h.includes(na));
          if(idx>=0) break;
        }
      }
      if(idx>=0){ map[f.key] = headers[idx]; used.add(idx); }
    }
  }

  // Pass 2: content-based detection for any column we haven't mapped yet.
  // This is what saves the day when headers are missing or unhelpful.
  if(rows && rows.length > 0){
    const detected = headers.map((_,colIdx) => {
      if(used.has(colIdx)) return null;
      return detectColumnContent(rows.map(r => r[colIdx]));
    });

    // Helper: claim a column for a given field if we haven't already mapped it
    const claim = (fieldKey, colIdx) => {
      if(map[fieldKey] || colIdx==null || used.has(colIdx)) return;
      map[fieldKey] = headers[colIdx];
      used.add(colIdx);
    };

    // Email & phone are unambiguous — claim first match
    detected.forEach((t, i) => { if(t==='email') claim('email', i); });
    detected.forEach((t, i) => { if(t==='phone') claim('phone', i); });

    // Full name: claim first column that's mostly "First Last" pattern
    detected.forEach((t, i) => { if(t==='fullName') claim('fullName', i); });

    // Single-word name columns: if there are exactly two adjacent ones, treat them as First + Last.
    // Otherwise treat the first one as First Name.
    const singleNameCols = [];
    detected.forEach((t, i) => { if(t==='firstOrLastName' && !used.has(i)) singleNameCols.push(i); });
    if(singleNameCols.length >= 2 && !map.fullName){
      claim('firstName', singleNameCols[0]);
      claim('lastName',  singleNameCols[1]);
    } else if(singleNameCols.length === 1 && !map.fullName && !map.firstName){
      claim('firstName', singleNameCols[0]);
    }
  }
  return map;
}

// Parse a CSV/TSV/pasted-text blob into { headers, rows }. Uses PapaParse if loaded
// (handles quoted multi-line fields, embedded commas, BOM). Falls back to a simple
// parser only if PapaParse isn't available for some reason.
function parseDelimitedText(text){
  if(typeof Papa !== 'undefined'){
    // Let PapaParse auto-detect comma vs tab vs semicolon
    const res = Papa.parse(text.trim(), {header:false, skipEmptyLines:'greedy', dynamicTyping:false});
    const data = (res.data||[]).filter(r => Array.isArray(r) && r.some(c => String(c||'').trim()!==''));
    if(data.length<1) return {headers:[], rows:[]};
    const headers = (data[0]||[]).map(h=>String(h||'').trim());
    const rows = data.slice(1).map(r => headers.map((_,i)=> String(r[i]==null?'':r[i]).trim()));
    return {headers, rows};
  }
  // Minimal fallback (shouldn't normally run)
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<1) return {headers:[], rows:[]};
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const headers = lines[0].split(sep).map(h=>h.trim());
  const rows = lines.slice(1).map(l => headers.map((_,i)=> (l.split(sep)[i]||'').trim()));
  return {headers, rows};
}

// Parse an .xlsx / .xls file (ArrayBuffer) into { headers, rows }.
function parseExcelBuffer(buf){
  if(typeof XLSX === 'undefined') throw new Error('Excel library not loaded');
  const wb = XLSX.read(buf, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  if(!ws) return {headers:[], rows:[]};
  const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
  const data = (aoa||[]).filter(r => Array.isArray(r) && r.some(c => String(c||'').trim()!==''));
  if(data.length<1) return {headers:[], rows:[]};
  const headers = (data[0]||[]).map(h=>String(h||'').trim());
  const rows = data.slice(1).map(r => headers.map((_,i)=> String(r[i]==null?'':r[i]).trim()));
  return {headers, rows};
}

// Build lead objects from { headers, rows } using a column mapping.
// Mapping values can be a string (single column) or an array (multi-column, e.g. notes).
// Also returns errors and dedupes against existing leads (by email or phone).
function buildLeadsFromRows({headers, rows, mapping, existingLeads}){
  // Build idx[key] = index OR idx[key] = [index, index, ...] for multi-mapped fields.
  const idx = {};
  for(const k of Object.keys(mapping||{})){
    const v = mapping[k];
    if(!v) continue;
    if(Array.isArray(v)){
      const arr = v.map(h => headers.indexOf(h)).filter(i => i>=0);
      if(arr.length) idx[k] = arr;
    } else {
      const i = headers.indexOf(v);
      if(i>=0) idx[k] = i;
    }
  }
  // Get a single value for a single-mapped field
  const get = (row,key) => {
    const ix = idx[key];
    if(ix==null) return '';
    if(Array.isArray(ix)) return String(row[ix[0]]||'').trim();
    return String(row[ix]||'').trim();
  };
  // Get all non-empty values for a multi-mapped field (returns array)
  const getAll = (row,key) => {
    const ix = idx[key];
    if(ix==null) return [];
    const indices = Array.isArray(ix) ? ix : [ix];
    return indices.map(i => String(row[i]||'').trim()).filter(Boolean);
  };
  // Parse a tags cell. Splits on comma, semicolon, or pipe.
  const parseTagsCell = (raw) => {
    if(!raw) return [];
    return String(raw).split(/[,;|]/).map(t => t.trim()).filter(Boolean);
  };
  const existingEmails = new Set((existingLeads||[]).map(l=>(l.email||'').toLowerCase().trim()).filter(Boolean));
  const existingPhones = new Set((existingLeads||[]).map(l=>String(l.phone||'').replace(/\D/g,'')).filter(p=>p.length>=7));
  const seenEmails = new Set();
  const seenPhones = new Set();
  const leads = [];
  const errors = [];
  const skippedDupes = [];
  rows.forEach((row,i)=>{
    const rowNum = i+2; // +1 for header, +1 for 1-indexed
    // Combine name from whichever fields are mapped. Priority:
    //   1. firstName + lastName (combined with a space) — preserves both pieces
    //   2. firstName alone
    //   3. lastName alone
    //   4. fullName fallback
    const first = get(row,'firstName');
    const last  = get(row,'lastName');
    const full  = get(row,'fullName');
    let name = '';
    if(first && last) name = (first+' '+last).trim();
    else if(first)    name = first;
    else if(last)     name = last;
    else if(full)     name = full;
    if(!name){ errors.push({row:rowNum, reason:'missing name'}); return; }
    const email = get(row,'email').toLowerCase();
    const phoneRaw = get(row,'phone');
    const phoneDigits = phoneRaw.replace(/\D/g,'');
    // Dedupe against existing + within this batch
    if(email && (existingEmails.has(email) || seenEmails.has(email))){
      skippedDupes.push({row:rowNum, name, reason:'duplicate email'});
      return;
    }
    if(phoneDigits.length>=7 && (existingPhones.has(phoneDigits) || seenPhones.has(phoneDigits))){
      skippedDupes.push({row:rowNum, name, reason:'duplicate phone'});
      return;
    }
    if(email) seenEmails.add(email);
    if(phoneDigits.length>=7) seenPhones.add(phoneDigits);
    // Combine notes from possibly multiple columns + background.
    // We label background separately so the AI can distinguish "background context" from "notes".
    const notesParts = getAll(row,'notes');
    const background = get(row,'background');
    const notesPieces = [];
    if(notesParts.length) notesPieces.push(notesParts.join('\n'));
    if(background)       notesPieces.push('Background: '+background);
    const finalNotes = notesPieces.join('\n\n');
    // Parse tags from spreadsheet, then add 'Imported' if not already there.
    const tagsFromSheet = parseTagsCell(get(row,'tags'));
    const allTags = [...new Set([...tagsFromSheet, 'Imported'])];
    leads.push({
      id: Date.now().toString()+i+Math.floor(Math.random()*9999),
      name,
      email: email || '',
      phone: normalizePhone(phoneRaw),
      type: normalizeType(get(row,'type')),
      stage: get(row,'stage') || 'New',
      source: get(row,'source') || 'Other',
      last_contact: new Date().toISOString().slice(0,10),
      notes: finalNotes,
      next_step: 'Follow up — imported from spreadsheet',
      tags: allTags,
      properties_shared:[], interested_properties:[], toured_properties:[],
      appointments:[], documents:[],
      created_at: new Date().toISOString(), updated_at: new Date().toISOString(),
    });
  });
  return {leads, errors, skippedDupes, count:leads.length};
}

function ImportModal({onClose, onImport, existingLeads}){
  // Persistence key — survives modal close, page reload, even logout-relogin within session.
  // Stores: text, fileName, rawData (the unsplit headers+rows), hasHeaderRow toggle, mapping, step.
  const PERSIST_KEY = 'agntai_import_v1';

  const loadPersisted = () => {
    try {
      const s = sessionStorage.getItem(PERSIST_KEY);
      return s ? JSON.parse(s) : null;
    } catch(e) { return null; }
  };
  const persisted = loadPersisted();

  // Steps: 'input' → 'map' → 'done'
  const [step, setStep] = useState(persisted?.step || 'input');
  const [text, setText] = useState(persisted?.text || '');
  const [fileName, setFileName] = useState(persisted?.fileName || '');
  // rawData holds the parsed result before header decision: { allRows: [[...], [...]], originalHeaders: [...] }
  // We keep allRows so the "first row is data" toggle can flip without re-parsing the file.
  const [rawData, setRawData] = useState(persisted?.rawData || null);
  const [hasHeaderRow, setHasHeaderRow] = useState(persisted?.hasHeaderRow !== false); // default true
  const [mapping, setMapping] = useState(persisted?.mapping || {});
  const [dragOver, setDragOver] = useState(false);
  const [parseError, setParseError] = useState('');
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState(0);
  const [result, setResult] = useState(null);
  const fileRef = useRef(null);

  // Derive headers + rows from rawData based on the toggle.
  // If hasHeaderRow: first row is headers, the rest are data.
  // If not: synthesize "Column 1, Column 2, ..." and treat ALL rows as data.
  const {headers, rows} = (() => {
    if(!rawData || !rawData.allRows || rawData.allRows.length===0) return {headers:[], rows:[]};
    const all = rawData.allRows;
    if(hasHeaderRow){
      const headers = (all[0]||[]).map(h => String(h||'').trim() || '(unnamed)');
      const rows = all.slice(1).map(r => headers.map((_,i)=> String(r[i]==null?'':r[i]).trim()));
      return {headers, rows};
    } else {
      const colCount = Math.max(...all.map(r => r.length));
      const headers = Array.from({length:colCount}, (_,i)=> 'Column '+(i+1));
      const rows = all.map(r => headers.map((_,i)=> String(r[i]==null?'':r[i]).trim()));
      return {headers, rows};
    }
  })();

  // Heuristic: does the supposed "header" row look like data? If the first row
  // contains an email or phone-shaped value, the user probably forgot to include headers.
  const headerLooksLikeData = (() => {
    if(!rawData || !rawData.allRows || rawData.allRows.length===0) return false;
    const first = rawData.allRows[0] || [];
    const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const phoneRx = /^[\d\s().+\-]{7,}$/;
    let dataLikeCount = 0;
    for(const cell of first){
      const v = String(cell||'').trim();
      if(!v) continue;
      if(emailRx.test(v)) dataLikeCount++;
      else if(phoneRx.test(v) && v.replace(/\D/g,'').length>=7) dataLikeCount++;
    }
    return dataLikeCount >= 1; // even one email/phone in the "header" row is suspicious
  })();

  // Track whether we auto-flipped the toggle for the user, so we can show an info bar
  // (and so we don't keep flipping it back if they explicitly turn it back on).
  const [autoFlipped, setAutoFlipped] = useState(persisted?.autoFlipped || false);
  const [userOverrodeToggle, setUserOverrodeToggle] = useState(persisted?.userOverrodeToggle || false);

  // Auto-flip: if we just loaded data and the first row looks like data, flip the toggle
  // to "no header row" automatically — saves the user a click.
  useEffect(() => {
    if(rawData && hasHeaderRow && headerLooksLikeData && !userOverrodeToggle){
      setHasHeaderRow(false);
      setAutoFlipped(true);
      setMapping({}); // force re-map against synthetic headers
    }
  }, [rawData, headerLooksLikeData, userOverrodeToggle]);

    if(step === 'done') return; // don't persist completed imports
    try {
      sessionStorage.setItem(PERSIST_KEY, JSON.stringify({
        step, text, fileName, rawData, hasHeaderRow, mapping, autoFlipped, userOverrodeToggle
      }));
    } catch(e) {}
  }, [step, text, fileName, rawData, hasHeaderRow, mapping, autoFlipped, userOverrodeToggle]);

  // Re-run auto-mapping whenever headers change (e.g., toggle flipped).
  // But ONLY auto-map if the user hasn't customized the mapping yet.
  useEffect(() => {

    }

    try { sessionStorage.removeItem(PERSIST_KEY); } catch(e) {}

      // Summary line
      built && React.createElement('div',{style:{fontSize:12,color:'#3a3631',background:'#fafaf8',border:'1px solid #e7e2d8',borderRadius:6,padding:'8px 12px',lineHeight:1.6}},

// SphereBadge — small clickable A/B/C pill for sphere contacts
function SphereBadge({lead, onUpd, size, style}){
  const [open, setOpen] = React.useState(false);
  const [popPos, setPopPos] = React.useState({left:0, top:0, openUp:false});
  const popRef = React.useRef(null);
  const btnRef = React.useRef(null);

  // Only render for sphere contacts
  if (!lead || lead.source !== 'SOI') return null;

  const cat = (lead.sphereCategory || 'B').toUpperCase();

  // Close popover when clicking outside (or when scrolling away)
  React.useEffect(()=>{
    if (!open) return;
    const closeHandler = (e) => {
      if (popRef.current && popRef.current.contains(e.target)) return;
      if (btnRef.current && btnRef.current.contains(e.target)) return;
      setOpen(false);
    };
    const scrollHandler = () => setOpen(false);
    setTimeout(()=>{
      document.addEventListener('mousedown', closeHandler);
      window.addEventListener('scroll', scrollHandler, true);
    }, 0);
    return () => {
      document.removeEventListener('mousedown', closeHandler);
      window.removeEventListener('scroll', scrollHandler, true);
    };
  }, [open]);

  // When opening, calculate exact viewport coordinates for the popover
  React.useEffect(()=>{
    if (!open || !btnRef.current) return;
    const rect = btnRef.current.getBoundingClientRect();
    const POP_HEIGHT = 168;
    const POP_WIDTH = 200;
    const spaceBelow = window.innerHeight - rect.bottom;
    const openUp = spaceBelow < POP_HEIGHT && rect.top > POP_HEIGHT;
    // Anchor horizontally to the badge's left, but keep on screen
    let left = rect.left;
    if (left + POP_WIDTH > window.innerWidth - 8) left = window.innerWidth - POP_WIDTH - 8;
    if (left < 8) left = 8;
    const top = openUp ? (rect.top - POP_HEIGHT - 6) : (rect.bottom + 6);
    setPopPos({left, top, openUp});
  }, [open]);

  const change = (newCat) => {
    onUpd({...lead, sphereCategory: newCat});
    setOpen(false);
  };

  const sizeStyle = size==='sm' ? {width:16, height:16, fontSize:9} : {};

  return React.createElement('span', {style:{position:'relative', display:'inline-block', ...style}},
    React.createElement('button', {
      ref: btnRef,
      className: 'sb-badge sb-' + cat,
      style: sizeStyle,
      onClick: (e) => { e.stopPropagation(); setOpen(!open); },
      title: cat==='A' ? 'A — Advocate (refers you proactively). Click to change.'
           : cat==='B' ? 'B — Fan (refers when asked). Click to change.'
           : 'C — Acquaintance (knows/likes/trusts you). Click to change.',
    }, cat),
    open && React.createElement('div', {
      ref: popRef,
      className: 'sb-pop',
      style: {position:'fixed', top: popPos.top, left: popPos.left, width: 200},
      onClick: e => e.stopPropagation(),
    },
      [
        {v:'A', label:'Advocate', desc:'Refers you proactively', cls:'sb-A'},
        {v:'B', label:'Fan', desc:'Refers when asked', cls:'sb-B'},
        {v:'C', label:'Acquaintance', desc:'Knows/likes/trusts you', cls:'sb-C'},
      ].map(opt => React.createElement('button', {
        key: opt.v,
        className: 'sb-pop-opt' + (cat===opt.v?' active':''),
        onClick: () => change(opt.v),
      },
        React.createElement('span', {className:'sb-pop-letter sb-badge sb-'+opt.v}, opt.v),
        React.createElement('div', {style:{display:'flex', flexDirection:'column', gap:1}},
          React.createElement('span', null, opt.label),
          React.createElement('span', {className:'sb-pop-desc'}, opt.desc)
        )
      ))
    )
  );
}
