function CommTimeline({lead, onUpd}) {
  const {useState, useEffect} = React;
  const [comms, setComms] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const [addChannel, setAddChannel] = useState('note');
  const [addStatus, setAddStatus] = useState('manual_note');
  const [addBody, setAddBody] = useState('');
  const [addSubject, setAddSubject] = useState('');
  const [saving, setSaving] = useState(false);

  const CHANNEL_ICONS = {email:'✉️', sms:'💬', call:'📞', note:'📝'};
  const STATUS_LABELS = {draft:'Sent', sent:'Sent', replied:'Replied ↩', no_answer:'No Answer', voicemail:'Voicemail 📱', connected:'Connected ✅', manual_note:'Note'};
  const CHANNEL_STATUS_OPTIONS = {
    email: ['draft','sent','replied'],
    sms: ['draft','sent','replied','no_answer'],
    call: ['connected','no_answer','voicemail'],
    note: ['manual_note'],
  };

  const load = async () => {
    setLoading(true);
    const data = await dbLoadCommunications(lead.id);
    setComms(data);
    setLoading(false);
  };

  useEffect(() => { load(); }, [lead.id]);

  // Listen for external "comm-logged" events (fired when contact panels confirm a send).
  // This keeps the timeline in sync without needing prop drilling.
  useEffect(() => {
    const handler = (e) => {
      if(e?.detail?.leadId === lead.id) load();
    };
    window.addEventListener('comm-logged', handler);
    return () => window.removeEventListener('comm-logged', handler);
  }, [lead.id]);

  const updateStatus = async (comm, newStatus, summary) => {
    const updated = {...comm, status: newStatus, summary: summary || comm.summary};
    if (newStatus==='sent' || newStatus==='connected') updated.sentAt = new Date().toISOString();
    await dbSaveCommunication(updated);
    setComms(prev => prev.map(c => c.id===comm.id ? updated : c));
    // Auto-advance the lead stage if this status change qualifies
    await autoAdvanceLeadStage(comm.leadId, comm.channel, comm.direction, newStatus, {summary: updated.summary});
    // Date detection — scan the summary text for future date references.
    try {
      const text = [updated.subject, updated.body, updated.summary].filter(Boolean).join(' \n ');
      if(text) {
        const sourceLabel = comm.channel === 'note' ? 'note'
                         : comm.channel === 'sms' ? 'text'
                         : comm.channel === 'email' ? 'email'
                         : comm.channel === 'call' ? 'call log'
                         : 'entry';
        detectAndNotify(comm.leadId, lead.name, text, sourceLabel);
      }
    } catch(e) {}
  };

  const saveNew = async () => {
    if (!addBody.trim() && addChannel!=='call') return;
    setSaving(true);
    // direction: replies and voicemails are inbound; notes/sent are outbound
    const inboundStatuses = ['replied','no_answer','voicemail','connected'];
    const comm = {
      id: Date.now().toString(),
      leadId: lead.id,
      channel: addChannel,
      direction: inboundStatuses.includes(addStatus) ? 'inbound' : 'outbound',
      status: addStatus,
      subject: addSubject.trim() || null,
      body: addBody.trim() || null,
      summary: null,
      source: 'manual',
      createdAt: new Date().toISOString(),
    };
    await dbSaveCommunication(comm);
    setComms(prev => [comm, ...prev]);
    // Auto-advance the lead stage if this comm qualifies
    await autoAdvanceLeadStage(comm.leadId, comm.channel, comm.direction, comm.status, {summary: comm.summary});
    // Date detection — scan body/subject for future date references.
    try {
      const text = [comm.subject, comm.body].filter(Boolean).join(' \n ');
      if(text) {
        const sourceLabel = comm.channel === 'note' ? 'note'
                         : comm.channel === 'sms' ? 'text'
                         : comm.channel === 'email' ? 'email'
                         : comm.channel === 'call' ? 'call log'
                         : 'entry';
        detectAndNotify(lead.id, lead.name, text, sourceLabel);
      }
    } catch(e) {}
    setAddBody(''); setAddSubject(''); setShowAdd(false);
    setSaving(false);
  };

  const fmtTime = iso => {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  };

  // Inline status update with optional reply text
  const [inlineUpdate, setInlineUpdate] = useState(null); // {commId, status, text}
  const confirmUpdate = async () => {
    if (!inlineUpdate) return;
    const comm = comms.find(c => c.id===inlineUpdate.commId);
    if (!comm) return;
    await updateStatus(comm, inlineUpdate.status, inlineUpdate.text);
    setInlineUpdate(null);
  };

  return React.createElement('div',null,
    loading
      ? React.createElement('div',{style:{fontSize:12,color:'#a09d98',padding:'8px 0'}},'Loading communications...')
      : comms.length===0 && React.createElement('div',{style:{fontSize:12,color:'#a09d98',fontStyle:'italic',marginBottom:10}},
          'No communications logged yet — use the Today page to send outreach and it will appear here.'
        ),
    comms.length>0 && React.createElement('div',{className:'ct-wrap',style:{marginBottom:12}},
      ...comms.map(c => {
        const isExpanded = expanded[c.id];
        // For calls — only show notes/summary, never the full script
        // For emails/SMS — show subject and short preview only
        // Scripts are for Today page only, not the timeline
        const isCall = c.channel==='call';
        const isNote = c.channel==='note';
        // What to show as the main content
        const displayBody = isCall
          ? (c.summary || '') // calls: only show summary/note, never script
          : (c.summary || c.body || '');
        // Truncate at 200 chars — timeline is for reference, not reading full messages
        const truncated = displayBody.length > 200 ? displayBody.slice(0,200)+'...' : displayBody;
        const isLong = displayBody.length > 200;
        return React.createElement('div',{key:c.id,className:'ct-item'},
          React.createElement('div',{className:'ct-spine'},
            React.createElement('div',{className:'ct-dot '+c.channel},CHANNEL_ICONS[c.channel]||'💬'),
            React.createElement('div',{className:'ct-line'})
          ),
          React.createElement('div',{className:'ct-body'},
            React.createElement('div',{className:'ct-head'},
              React.createElement('span',{className:'ct-chan '+c.channel},c.channel),
              React.createElement('span',{className:'ct-status '+c.status},STATUS_LABELS[c.status]||c.status),
              React.createElement('span',{className:'ct-dir'},c.direction==='inbound'?'↙ inbound':'↗ outbound'),
              React.createElement('span',{className:'ct-time'},fmtTime(c.createdAt))
            ),
            // Subject line for emails
            !isCall && !isNote && c.subject && React.createElement('div',{className:'ct-subj'},c.subject),
            // Body — clean and short
            truncated && React.createElement('div',{
              className:'ct-preview'+(isLong&&!isExpanded?' collapsed':''),
              style:{cursor:isLong?'pointer':'default'},
              onClick:()=>isLong&&setExpanded(p=>({...p,[c.id]:!p[c.id]}))
            },isExpanded?displayBody:truncated,isLong&&React.createElement('span',{style:{color:'#1a6b4a',fontSize:11,marginLeft:4}},isExpanded?' ▲ less':' ▼ more')),
            // Outcome buttons — only for sent entries without a final outcome

                style:{flex:1,padding:'5px 8px',border:'1px solid #e8e6e2',borderRadius:5,fontFamily:'inherit',fontSize:12,outline:'none'},

function ProtocolCard({lead, onUpd}) {

  },[lead.id]);

  const protocol = getProtocolById(lead.activeProtocolId);
  const pCtx = buildProtocolContext(lead, protocol, commHistory);

  const assignProtocol = (id) => {
    onUpd({...lead,
      activeProtocolId: id,
      protocolStep: 0,
      protocolStartedAt: new Date().toISOString()
    });
    setShowPicker(false);
  };

  const [logging, setLogging] = useState(false);

  const advanceStep = async () => {
    if(!pCtx) return;
    setLogging(true);
    // Log the communication to the timeline
    const channelMap = {sms:'sms', email:'email', call:'call', note:'note'};
    const channel = channelMap[pCtx.channel] || 'note';
    await dbLogComm(lead.id, channel, 'outbound', 'sent', {
      subject: pCtx.objective,
      body: channel==='call' ? null : pCtx.draft,
      source: 'protocol',
    });
    // Advance protocol step — three completion paths:
    //   1. sphere_announcement complete → transition into sphere_nurture
    //   2. sphere_nurture complete → loop back to step 0 with fresh start date
    //   3. all other protocols → set activeProtocolId to null (done)
    const nextStep = (lead.protocolStep||0) + 1;
    const isComplete = protocol && nextStep >= protocol.steps.length;
    let nextProtocolFields;
    if (isComplete && protocol.id === 'sphere_announcement') {
      // Announcement done → start nurture immediately
      nextProtocolFields = {
        protocolStep: 0,
        activeProtocolId: 'sphere_nurture',
        protocolStartedAt: new Date().toISOString(),
      };
    } else if (isComplete && protocol.id === 'sphere_nurture') {
      // Nurture complete → loop back to step 0 with fresh start date
      nextProtocolFields = {
        protocolStep: 0,
        activeProtocolId: 'sphere_nurture',
        protocolStartedAt: new Date().toISOString(),
      };
    } else if (isComplete) {
      // Any other protocol → done, clear it
      nextProtocolFields = {
        protocolStep: nextStep,
        activeProtocolId: null,
        protocolStartedAt: null,
      };
    } else {
      // Normal mid-protocol step advance
      nextProtocolFields = {
        protocolStep: nextStep,
        activeProtocolId: lead.activeProtocolId,
        protocolStartedAt: lead.protocolStartedAt,
      };

    onUpd({...lead, ...nextProtocolFields, lastContact: new Date().toISOString().slice(0,10)});
    setLogging(false);
  };

    onUpd({...lead, activeProtocolId:null, protocolStep:0, protocolStartedAt:null});
    setShowPicker(false);

            React.createElement('button',{
              onClick:()=>setShowPicker(false),
              style:{marginTop:8,fontSize:11,color:'#a09d98',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}
            },'✕ Cancel')
          )
        : React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
            React.createElement('div',{style:{fontSize:12,color:'#a09d98',fontStyle:'italic'}},
              'No active protocol — assign one to get structured follow-up guidance'
            ),
            React.createElement('button',{
              className:'bs',
              style:{fontSize:11,padding:'4px 10px',flexShrink:0},
              onClick:()=>setShowPicker(true)
            },'+ Assign Protocol')
          )
    );
  }

  // Protocol active — show current step card
  const timingClass = pCtx?.isOverdue ? 'overdue' : pCtx?.isDueToday ? 'today' : 'upcoming';
  const timingText = pCtx?.isOverdue
    ? '⚠️ Overdue — '+Math.abs(pCtx.daysUntilDue)+' days late'
    : pCtx?.isDueToday ? '🔴 Due today'
    : pCtx ? '📅 '+pCtx.timingLabel
    : '✅ Protocol complete';

    // Header
    React.createElement('div',{className:'proto-header'},
      React.createElement('div',{className:'proto-name'},
        React.createElement('span',null,protocol.icon),
        React.createElement('span',null,protocol.name)
      ),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
        pCtx && React.createElement('span',{className:'proto-progress'},
          'Step '+(pCtx.stepIdx+1)+' of '+pCtx.total
        ),
        React.createElement('button',{
          onClick:()=>setShowPicker(true),
          style:{fontSize:10,color:'#a09d98',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}
        },'Change'),
        React.createElement('button',{
          onClick:clearProtocol,
          style:{fontSize:10,color:'#a09d98',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}
        },'✕')
      )
    ),
    // Picker overlay
    showPicker && React.createElement('div',{style:{padding:12,borderBottom:'1px solid #e8e6e2',background:'#f8f7f5'}},
      React.createElement('div',{className:'proto-select-label',style:{marginBottom:6}},'Switch to protocol:'),
      React.createElement('div',{className:'proto-grid'},
        ...PROTOCOLS.map(p => React.createElement('button',{
          key:p.id,
          className:'proto-option'+(lead.activeProtocolId===p.id?' active':''),
          onClick:()=>assignProtocol(p.id)
        },
          React.createElement('span',{className:'proto-option-icon'},p.icon),
          React.createElement('div',{className:'proto-option-info'},
            React.createElement('div',{className:'proto-option-name'},p.name),
            React.createElement('div',{className:'proto-option-goal'},p.goal)
          )
        ))
      ),
      React.createElement('button',{onClick:()=>setShowPicker(false),style:{marginTop:8,fontSize:11,color:'#a09d98',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}},'✕ Cancel')
    ),

    pCtx
      ? React.createElement('div',{className:'proto-body'},

          React.createElement('div',{className:'proto-objective'},pCtx.objective),
          React.createElement('div',{className:'proto-timing '+timingClass},
            CHAN_ICONS[pCtx.channel]||'📋', ' ',timingText,' · ',pCtx.channel.toUpperCase()

          // Actions

            React.createElement('button',{

            },logging?'Logging...':'✓ Done — Next Step →'),

function DocumentsSection({lead, onUpd}) {
  const [docs, setDocs] = useState(lead.documents||[]);
  const [uploading, setUploading] = useState(false);
  const [extracting, setExtracting] = useState(null); // doc id being extracted
  const [extractErr, setExtractErr] = useState('');
  const [urls, setUrls] = useState({});

  // Load signed URLs for all docs
  React.useEffect(()=>{
    docs.forEach(async d=>{
      if(d.storagePath && !urls[d.id]){
        const url = await storageGetUrl(d.storagePath);
        if(url) setUrls(prev=>({...prev,[d.id]:url}));
      }
    });
  },[docs]);

  const saveDocs = async (newDocs) => {
    setDocs(newDocs);
    try {
      await onUpd({...lead, documents: newDocs});
    } catch(e) {
      console.error('Document save error:', e);
    }
  };

  const handleUpload = async (file) => {
    if(!file) return;
    if(file.size > 50*1024*1024){ alert('File too large — max 50MB'); return; }
    setUploading(true);
    const result = await storageUpload(lead.id, file);
    if(result.error){ alert('Upload failed: '+result.error); setUploading(false); return; }
    const newDoc = {
      id: Date.now().toString(),
      name: file.name,
      type: file.type,
      size: file.size,
      storagePath: result.path,
      uploadedAt: new Date().toISOString().slice(0,10),
    };
    const newDocs = [...docs, newDoc];
    await saveDocs(newDocs);
    // Load URL for new doc
    const url = await storageGetUrl(result.path);
    if(url) setUrls(prev=>({...prev,[newDoc.id]:url}));
    setUploading(false);
  };

  const handleDelete = async (doc) => {
    if(!window.confirm('Delete "'+doc.name+'"? This cannot be undone.')) return;
    if(doc.storagePath) await storageDelete(doc.storagePath);
    await saveDocs(docs.filter(d=>d.id!==doc.id));
  };

  const handleCreateTransaction = async (doc) => {
    setExtractErr('');
    setExtracting(doc.id);
    try {
      // Download file from storage as base64
      const base64 = await storageGetBase64(doc.storagePath);
      if(!base64){ setExtractErr('Could not read file.'); setExtracting(null); return; }
      // Detect contract type from filename
      const fname = doc.name.toLowerCase();
      const contractType = fname.includes('lease')||fname.includes('rental') ? 'lease'
        : fname.includes('listing') ? 'listing' : 'purchase';
      // Check size — log actual values so we can tune
      const approxTokens = Math.round(base64.length / 750); // ~750 base64 chars per token for PDFs
      if(approxTokens > 190000){
        setExtractErr('Document too large for AI reading (' + Math.round(base64.length/1024/1024*10)/10 + 'MB). Try compressing the PDF first.');
        setExtracting(null); return;
      }
      const fields = await extractContractFields(base64, contractType);
      if(!fields){ setExtractErr('Could not extract data. Please fill in the transaction manually.'); setExtracting(null); return; }
      // Save transaction
      const {data:{user}} = await db.auth.getUser();
      const tx = {
        id: Date.now().toString(),
        lead_id: lead.id,
        agent_id: user.id,
        side: fields.side || (contractType==='listing'?'seller':contractType==='lease'?'tenant':'buyer'),
        status: (contractType==='lease'||fields.side==='tenant'||fields.side==='landlord') ? 'active_lease' : 'under_contract',
        property_type: fields.property_type || 'single_family',
        financing: fields.financing || 'conventional',
        purchase_price: fields.purchase_price || '',
        property_address: fields.property_address || '',
        acceptance_date: fields.acceptance_date || '',
        close_date: fields.close_date || '',
        deposit_due_date: fields.deposit_due_date || '',
        inspection_removal_date: fields.inspection_removal_date || '',
        appraisal_removal_date: fields.appraisal_removal_date || '',
        loan_removal_date: fields.loan_removal_date || '',
        possession_date: fields.possession_date || '',
        notes: fields.notes || '',
        updated_at: new Date().toISOString(),
      };
      await dbSaveTransaction(tx);
      alert('✅ Transaction created from '+doc.name+'!\n\nGo to the Transactions page to review and confirm all details.');
    } catch(e) {
      setExtractErr('Something went wrong. Please try again.');
    }
    setExtracting(null);
  };

  const isPDF = d => d.type==='application/pdf' || d.name?.toLowerCase().endsWith('.pdf');
  const isContract = d => {
    const n = (d.name||'').toLowerCase();
    return n.includes('purchase')||n.includes('lease')||n.includes('listing')||n.includes('agreement')||n.includes('contract');
  };
  const fmtSize = b => b > 1024*1024 ? (b/1024/1024).toFixed(1)+'MB' : Math.round(b/1024)+'KB';

  return React.createElement('div',null,
    // Document list
    docs.length===0 && React.createElement('p',{className:'em2',style:{marginBottom:10}},'No documents yet — upload contracts, agreements, or any files for this lead'),
    docs.length>0 && React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:6,marginBottom:10}},
      ...docs.map(d=>React.createElement('div',{key:d.id,style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#fafaf9',border:'1px solid #e8e6e2',borderRadius:8}},
        React.createElement('div',{style:{fontSize:20,flexShrink:0}},isPDF(d)?'📄':'📎'),
        React.createElement('div',{style:{flex:1,minWidth:0}},
          React.createElement('div',{style:{fontSize:13,fontWeight:500,color:'#1a1916',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},d.name),
          React.createElement('div',{style:{fontSize:11,color:'#a09d98',marginTop:1}},d.uploadedAt+(d.size?' · '+fmtSize(d.size):''))
        ),
        // Create transaction button for PDF contracts
        isPDF(d)&&isContract(d)&&React.createElement('button',{
          onClick:()=>handleCreateTransaction(d),
          disabled:!!extracting,
          style:{fontSize:11,padding:'4px 10px',background:extracting===d.id?'#f0faf5':'#1a6b4a',color:extracting===d.id?'#1a6b4a':'white',border:'1px solid '+(extracting===d.id?'#bbf0d8':'#1a6b4a'),borderRadius:6,cursor:extracting?'default':'pointer',fontFamily:'inherit',fontWeight:600,whiteSpace:'nowrap',flexShrink:0}
        },extracting===d.id?'⏳ Reading...':'✨ Create Transaction'),
        // Download
        urls[d.id]&&React.createElement('a',{href:urls[d.id],target:'_blank',rel:'noreferrer',style:{fontSize:11,padding:'4px 10px',background:'white',border:'1px solid #e8e6e2',borderRadius:6,color:'#6b6760',textDecoration:'none',flexShrink:0}},'⬇ Download'),
        // Delete
        React.createElement('button',{
          onClick:()=>handleDelete(d),
          style:{fontSize:11,padding:'4px 8px',background:'none',border:'1px solid #e8e6e2',borderRadius:6,color:'#a09d98',cursor:'pointer',fontFamily:'inherit',flexShrink:0}
        },'✕')
      ))
    ),
    extractErr && React.createElement('div',{style:{padding:'8px 10px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:6,fontSize:12,color:'#dc2626',marginBottom:8}},extractErr),
    // Upload button
    React.createElement('label',{
      style:{display:'inline-flex',alignItems:'center',gap:7,padding:'8px 14px',background:uploading?'#f0faf5':'white',border:'1px dashed '+(uploading?'#1a6b4a':'#e8e6e2'),borderRadius:7,fontSize:12,fontWeight:500,color:uploading?'#1a6b4a':'#6b6760',cursor:uploading?'default':'pointer',transition:'all 0.15s'}
    },
      uploading?'⏳ Uploading...':'📎 Upload Document',
      !uploading&&React.createElement('span',{style:{fontSize:10,color:'#a09d98'}},'PDF, DOC, JPG — max 50MB'),
      !uploading&&React.createElement('input',{type:'file',accept:'.pdf,.doc,.docx,.jpg,.jpeg,.png',style:{display:'none'},onChange:e=>handleUpload(e.target.files[0])})
    ),
    docs.some(d=>isPDF(d)&&isContract(d))&&React.createElement('div',{style:{fontSize:11,color:'#a09d98',marginTop:6}},'💡 Click "✨ Create Transaction" on any contract to auto-fill a new transaction')
  );
}

function CalView({leads,transactions,onSel,onTaskAction}){
  const today=new Date();
  const [cur,setCur]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const yr=cur.getFullYear(),mo=cur.getMonth();
  const mname=cur.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  // Unified calendar items: appointments + scheduled tasks + transaction deadlines.
  // Single source of truth — same shape consumed by morning scan + this view.
  const all=useMemo(()=>buildCalendarItems(leads,transactions),[leads,transactions]);
  const byd=useMemo(()=>{const m={};all.forEach(x=>{if(!m[x.date])m[x.date]=[];m[x.date].push(x);});return m;},[all]);

  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),dip=new Date(yr,mo,0).getDate();
  const cells=[];
  for(let i=fd-1;i>=0;i--)cells.push({date:new Date(yr,mo-1,dip-i),tm:false});
  for(let d=1;d<=dim;d++)cells.push({date:new Date(yr,mo,d),tm:true});
  const rem=42-cells.length;for(let d=1;d<=rem;d++)cells.push({date:new Date(yr,mo+1,d),tm:false});
  const ts=d=>d.toISOString().slice(0,10);
  const isT=d=>ts(d)===ts(today);
  const upc=useMemo(()=>{
    const t=ts(today);const f=new Date(today);f.setDate(f.getDate()+30);
    return all.filter(x=>x.date>=t&&x.date<=ts(f)).sort((a,b)=>a.date.localeCompare(b.date));
  },[all]);

  // Count of pending AI-proposed tasks across all visible items — drives the badge.
  const pendingCount = upc.filter(x => x.source==='task' && x.status==='pending').length;

  // Render one event pill in a calendar cell. Class encodes source + lead type
  // (for appointments) + status (pending vs confirmed for tasks).
  const renderCell = (item) => {
    let cls = 'cev';
    let label = '';
    if(item.source === 'appointment') {
      cls += ' '+item.lead.type;
      label = `${item.type} · ${item.lead.name.split(' ')[0]}`;
    } else if(item.source === 'task') {
      cls += ' task';
      if(item.status === 'pending') cls += ' pending';
      label = `${item.label} · ${item.lead.name.split(' ')[0]}`;
    } else if(item.source === 'deadline') {
      cls += ' deadline';
      label = `${item.label} · ${item.lead.name.split(' ')[0]}`;
    }
    const titleParts = [item.label, '— '+item.lead.name];
    if(item.source==='task' && item.status==='pending') titleParts.push('(AI suggested — pending confirmation)');
    if(item.source==='deadline') titleParts.push('(transaction deadline)');
    return React.createElement('div',{
      key:item.id,
      className:cls,
      title:titleParts.join(' '),
      onClick:()=>onSel(item.leadId)

  // Render one row in the Upcoming list. Tasks (pending) get confirm/dismiss buttons.
  const renderUpcoming = (item) => {

            : item.source==='task' ? '#f97316'

      ? React.createElement('span',{className:'tk-badge pending'},'AI · Pending')

      actions.push(

          key:'cf',
          className:'tk-confirm',
          onClick:()=>onTaskAction(item.leadId, item.raw.id, 'confirm')
        },'✓ Confirm'),
        React.createElement('button',{
          key:'dm',
          className:'tk-dismiss',
          onClick:()=>onTaskAction(item.leadId, item.raw.id, 'dismiss')
        },'✕ Dismiss')
      );
    }
    // Appointments still get the Google Cal link
    if(item.source==='appointment') {
      actions.push(React.createElement('a',{
        key:'gc',
        className:'gb',
        href:gcal(item.raw,item.lead.name),
        target:'_blank',
        rel:'noreferrer'
      },'📅 Google Cal'));
    }
    actions.push(React.createElement('button',{key:'vl',className:'vlb',onClick:()=>onSel(item.leadId)},'View Lead'));
    return React.createElement('div',{key:item.id,className:'upi'},
      React.createElement('div',{className:'upd'},
        React.createElement('span',{className:'upm'},mon),
        React.createElement('span',{className:'upn'},day)
      ),
      React.createElement('div',{style:{width:3,alignSelf:'stretch',borderRadius:2,background:tc,flexShrink:0}}),
      React.createElement('div',{className:'upin'},
        React.createElement('div',{className:'upty'}, item.label, badgeNode),
        React.createElement('div',{className:'uplead'},

            item.source==='deadline' ? 'Transaction'

              : item.lead.type

        ),

      ),

        ),

      ),
      React.createElement('div',{className:'cn'},
        React.createElement('button',{className:'ctd',onClick:()=>setCur(new Date(today.getFullYear(),today.getMonth(),1))},'Today'),
        React.createElement('button',{className:'cnb',onClick:()=>setCur(new Date(yr,mo-1,1))},'‹'),
        React.createElement('span',{className:'cm'},mname),
        React.createElement('button',{className:'cnb',onClick:()=>setCur(new Date(yr,mo+1,1))},'›')

    ),

  // Default to gmail_web — works for everyone with a Google account, no system setup required.
  const [emailHandler,setEmailHandler]=useState(meta.email_handler||'gmail_web');
  const [busy,setBusy]=useState(false);
  const [saved,setSaved]=useState(false);

async function extractContractFields(base64PDF, contractType) {
  const typeInstructions = contractType === 'lease'
    ? `This is a LEASE AGREEMENT. Extract these fields:
- property_address: full property address
- purchase_price: monthly rent amount (just the number, e.g. "3500")
- side: always return "tenant" unless document clearly shows landlord perspective
- acceptance_date: lease start date (YYYY-MM-DD)
- close_date: lease end date (YYYY-MM-DD)
- possession_date: move-in date (YYYY-MM-DD)
- deposit_due_date: security deposit due date if mentioned (YYYY-MM-DD)
- financing: always return "cash" for leases
- property_type: type of property (single_family, condo, multi_family, or commercial)
- notes: any important terms — pet policy, parking, utilities included, special conditions`
    : contractType === 'listing'
    ? `This is a LISTING AGREEMENT. Extract these fields:
- property_address: full property address
- purchase_price: listing price (just the number, e.g. "1250000")
- side: always return "seller"
- acceptance_date: listing agreement date (YYYY-MM-DD)
- close_date: listing expiration date (YYYY-MM-DD)
- possession_date: null
- deposit_due_date: null
- inspection_removal_date: null
- appraisal_removal_date: null
- loan_removal_date: null
- financing: always return "conventional" for listings
- property_type: type of property (single_family, condo, multi_family, or commercial)
- notes: commission rate, special terms, seller concessions, lockbox info`
    : `This is a PURCHASE AGREEMENT. Extract these fields:
- property_address: full property address
- purchase_price: purchase price (just the number, e.g. "850000")
- side: "buyer" or "seller" based on who this agreement represents
- acceptance_date: acceptance/offer date (YYYY-MM-DD)
- close_date: close of escrow date (YYYY-MM-DD)
- deposit_due_date: initial deposit due date (YYYY-MM-DD)
- inspection_removal_date: inspection contingency removal date (YYYY-MM-DD)
- appraisal_removal_date: appraisal contingency removal date (YYYY-MM-DD)
- loan_removal_date: loan contingency removal date (YYYY-MM-DD)
- possession_date: possession date (YYYY-MM-DD)
- financing: one of: conventional, fha, va, cash, jumbo
- property_type: one of: single_family, condo, multi_family, commercial
- notes: any important terms or conditions worth noting`;

  const prompt = `You are a real estate document reader. Read this contract carefully and extract the key fields.

${typeInstructions}

RULES:
- Return ONLY valid JSON, no markdown, no explanation
- If a field is not found in the document, return null for that field
- For dates, always use YYYY-MM-DD format
- For prices, return numbers only without $ or commas
- Be precise — agents will rely on these dates for critical deadlines

Return this exact JSON structure:
{
  "property_address": null,
  "purchase_price": null,
  "side": null,
  "acceptance_date": null,
  "close_date": null,
  "deposit_due_date": null,
  "inspection_removal_date": null,
  "appraisal_removal_date": null,
  "loan_removal_date": null,
  "possession_date": null,
  "financing": null,
  "property_type": null,
  "notes": null,
  "confidence": "high/medium/low"
}`;

  const { res: response, data } = await callAnthropic({
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 2000,
    messages: [{
      role: 'user',
      content: [
        {type:'document', source:{type:'base64', media_type:'application/pdf', data:base64PDF}},
        {type:'text', text:prompt}
      ]
    }]
  });
  if(data.error){ console.error('[Contract Extract] API error:', data.error); return null; }
  const text = data.content?.[0]?.text || '';
  try {
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch(e) {
    const match = text.match(/\{[\s\S]*\}/);
    if(match) { try { return JSON.parse(match[0]); } catch(e2) {} }
    return null;
  }
}

    if(!file) return;

    if(file.size > 25 * 1024 * 1024) { setExtractError('File too large — max 25MB.'); return; }
    setExtracting(true); setExtractError('');
    try {
      const base64Full = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = () => rej(new Error('Failed to read file'));
        reader.readAsDataURL(file);
      });
      // Check approximate token count — 1 token ≈ 0.75 bytes of base64
      // 200k token limit = ~150MB of base64, but PDF images are very token-heavy
      // Safe limit is ~5MB of base64 for scanned PDFs, ~15MB for text PDFs
      const approxTokens = Math.round((base64Full.length * 0.75) / 4);
      if(approxTokens > 180000){
        setExtractError('This PDF is too large for AI reading (' + Math.round(file.size/1024/1024*10)/10 + 'MB). Please try a smaller file or a text-based PDF (not a scanned image). Most contracts under 5MB work fine.');
        setExtracting(false);
        return;

      const base64 = base64Full;

      if(!fields) { setExtractError('Could not read contract. Please check the file and try again.'); return; }
      setForm(prev => ({
        ...prev,

        status: contractType === 'lease' ? 'active_lease' : prev.status,

// ── AI ASSISTANT ──────────────────────────────────────────────────────────────
function AIAssistantView({leads, transactions, onGoToLead}) {
  const {useState, useEffect, useRef, useMemo} = React;
  // Persistence — restore the last conversation state so leaving and returning
  // doesn't wipe a draft message or in-progress AI conversation.
  const ASSIST_KEY = 'agntai_assistant_state_v1';
  const initial = (() => {
    try { const s = sessionStorage.getItem(ASSIST_KEY); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
  })();
  const [messages, setMessages] = useState(initial.messages || []);
  const [input, setInput] = useState(initial.input || '');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  // Ref to the scrolling messages container so we can reset scroll on mount/view-enter
  const messagesContainerRef = useRef(null);
  // Active lead context: when a user comes in from a lead page, we know which lead they're
  // discussing, so we can offer "Text it" / "Email it" buttons that hand off to that lead's contact.
  const [activeLeadId, setActiveLeadId] = useState(initial.activeLeadId || null);
  const activeLead = useMemo(() => activeLeadId ? leads.find(l=>l.id===activeLeadId) : null, [activeLeadId, leads]);
  const isMobileDevice = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

  // ── COMM HISTORY FOR FULL DATA ACCESS ────────────────────────────────────
  // The AI assistant needs to see actual communication history (texts, emails,
  // calls) for each lead — not just stage and lastContact date. This lets it
  // answer questions like "which New leads have I already texted?" or "show me
  // leads where I'm waiting on a reply." Without this, the AI is guessing.
  //
  // We load on mount + refresh before each send so the AI always sees current data.
  const [commsByLead, setCommsByLead] = useState({});

  const loadAllComms = React.useCallback(async () => {
    if(!leads || !leads.length) return;
    try {
      const arrays = await Promise.all(leads.map(l => dbLoadCommunications(l.id).catch(()=>[])));
      const map = {};
      leads.forEach((l, i) => { map[l.id] = arrays[i] || []; });
      setCommsByLead(map);
    } catch(e) { console.error('Failed to load comms for assistant:', e); }
  }, [leads]);

  // Load on mount and whenever the leads list changes
  useEffect(() => { loadAllComms(); }, [loadAllComms]);

  // Mount: scroll the messages container to TOP so the user starts reading from
  // the beginning of the conversation, not at the input box at the bottom.
  // This runs ONCE per mount, regardless of whether messages were restored from storage.
  useEffect(() => {
    if(messagesContainerRef.current){
      messagesContainerRef.current.scrollTop = 0;
    }
  }, []);

  // Save state whenever it changes
  useEffect(() => {
    try {
      sessionStorage.setItem(ASSIST_KEY, JSON.stringify({messages, input, activeLeadId}));
    } catch(e) {}
  }, [messages, input, activeLeadId]);

  // Extract a probable message body from an AI response. The assistant often wraps drafts
  // between --- separators or after a "Subject:" line. Try to be helpful but conservative —
  // if we can't find a clean draft, send the whole message and the user can edit.
  // Extract a probable message body from an AI response. Returns {subject, body}
  // with body = '' if no clear draft is found. Three strategies, preferred order:
  //   1. Content between --- markers (the explicit/preferred format)
  //   2. Top-of-message blockquote (>) lines
  //   3. Greeting-bounded: starts with "Hi/Hey/Hello [name]" → take until a coaching marker
  // If none match, body is empty and we don't show send buttons (avoids logging coaching).
  const extractDraft = (content) => {
    if(!content) return {subject:null, body:''};
    // Strategy 1: between --- markers
    const sepMatch = content.match(/(?:^|\n)---\s*\n([\s\S]+?)\n---/);
    if(sepMatch){
      let body = sepMatch[1].trim();
      let subject = null;
      const subjMatch = body.match(/^\s*Subject\s*:\s*(.+?)(?:\n|$)/i);
      if(subjMatch){ subject = subjMatch[1].trim(); body = body.replace(subjMatch[0], '').trim(); }
      return {subject, body};
    }
    // Strategy 2: top-of-message blockquote
    const lines = content.split('\n');
    const quoteLines = [];
    let foundQuoteStart = false;
    for(const line of lines){
      if(line.startsWith('> ')){ quoteLines.push(line.slice(2)); foundQuoteStart = true; }
      else if(foundQuoteStart) break;
    }
    if(quoteLines.length >= 2){
      return {subject:null, body: quoteLines.join('\n').trim()};
    }
    // Strategy 3: greeting-bounded
    const greetIdx = content.search(/(?:^|\n\n)(?:Hi|Hey|Hello|Good (?:morning|afternoon|evening))[\s,]/);
    if(greetIdx >= 0){
      let start = greetIdx;
      while(start < content.length && content[start] === '\n') start++;
      let body = content.slice(start);
      // Cut at a --- separator line (the AI uses this to end the message and start coaching)
      const dashStop = body.match(/\n\s*---\s*(?:\n|$)/);
      if(dashStop) body = body.slice(0, dashStop.index).trim();
      // Cut at decorated coaching markers (** / ##)
      const stopRx = /\n\s*(?:#+\s*|\*\*)(?:Coaching|Tips?|Notes?|Strategy|Why(?:\s+(?:this|that))?|Reasoning|Explanation|How to|What to|Flag)[\s\S]*$/i;
      body = body.replace(stopRx, '').trim();
      // Cut at undecorated coaching markers ("Coaching:" on its own)
      const stopRx2 = /\n\s*(?:Coaching|Tips?|Notes?|Strategy|Why(?:\s+(?:this|that))?|Reasoning|Explanation|Flag)\s*:/i;
      const m2 = body.match(stopRx2);
      if(m2) body = body.slice(0, m2.index).trim();
      body = body.replace(/\n\s*Go[.!]?\s*$/i, '').trim();
      // Also strip any trailing --- lines that snuck through
      body = body.replace(/\n\s*---\s*$/g, '').trim();
      // Sanity: drafts are normally < 1500 chars. Anything longer is probably coaching, not a draft.
      if(body.length > 0 && body.length < 1500) return {subject:null, body};
    }
    return {subject:null, body:''};
  };

  // Hand off a draft to text or email, with pending-log flow (same machinery as lead page)
  // After clicking Text/Email from an assistant message, on desktop we can't
  // reliably hand off, so we surface inline guidance instead. This state holds
  // it: { messageIdx, channel, phone/email, body, subject }
  const [assistantHelper, setAssistantHelper] = useState(null);
  // Track when a log was successful, briefly, to show feedback in the helper panel
  const [helperLogged, setHelperLogged] = useState(false);
  // Copy feedback state for Copy buttons
  const [copiedKey, setCopiedKey] = useState(null);
  const copyWithFeedback = (text, key) => {
    try { navigator.clipboard.writeText(text||''); } catch(e){}
    setCopiedKey(key);
    setTimeout(() => setCopiedKey(prev => prev===key ? null : prev), 1500);
  };

  // Reset the chat — clears messages, input, lead context, helper, and persisted state.
  // Used by the "New chat" button and by the sidebar/mobile-tab "AI Assistant" link.
  const resetChat = () => {
    setMessages([]);
    setInput('');
    setActiveLeadId(null);
    setAssistantHelper(null);
    try { sessionStorage.removeItem(ASSIST_KEY); } catch(e) {}
  };

  // Listen for assistant-reset events fired by the sidebar/mobile-tab navigation.
  // When the user clicks "AI Assistant" from the menu, they want a fresh conversation
  // about their whole business, not the leftover lead-specific chat.
  useEffect(() => {
    const handler = () => resetChat();
    window.addEventListener('assistant-reset', handler);
    return () => window.removeEventListener('assistant-reset', handler);
  }, []);

  // Log a sent message directly from the assistant view, without making the user
  // navigate back to the lead's page. Updates the comm record AND lead.lastContact,
  // then fires events so any open lead view refreshes.
  const logFromAssistant = async (channel, body, subject) => {
    if(!activeLead) return;
    const d = new Date();
    const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    if(channel==='sms'){
      await dbLogComm(activeLead.id, 'sms', 'outbound', 'sent', {body: body || null, source:'assistant'});
    } else if(channel==='email'){
      await dbLogComm(activeLead.id, 'email', 'outbound', 'sent', {subject: subject || 'Following up', body: body || null, source:'assistant'});
    } else if(channel==='call'){
      await dbLogComm(activeLead.id, 'call', 'outbound', 'sent', {subject:'Called', summary: body || null, source:'assistant'});
    }
    // Update lastContact on the lead so the timestamp shows up everywhere
    try {
      await dbSaveLead({...activeLead, lastContact: today});
    } catch(e) { console.error('Lead update failed:', e); }
    // Clear pending state
    try { sessionStorage.removeItem('agntai_pending_send_v1'); } catch(e) {}
    // Fire events so timeline + lead list refresh anywhere they're mounted
    try {
      window.dispatchEvent(new CustomEvent('comm-logged', {detail:{leadId:activeLead.id}}));
      window.dispatchEvent(new CustomEvent('lead-updated', {detail:{leadId:activeLead.id}}));
    } catch(e) {}
    // Mark helper as logged — leave the panel open so user can navigate to the lead
    // page (or stay here for follow-up questions). User dismisses it manually.
    setHelperLogged(true);
  };

  // Lighter helper for the Email anchor: just records the pending-log marker.
  // The <a href="mailto:..."> does the actual handoff. Browser will fire the user's
  // mail handler, or do nothing if none is configured (we'll detect that below).
  const setupPendingForEmail = (content) => {
    if(!activeLead) return null;
    const {subject, body} = extractDraft(content);
    if(!body) return null;
    const pending = {
      leadId: activeLead.id,
      channel: 'email',
      body,
      subject: subject || 'Following up',
      startedAt: new Date().toISOString(),
    };
    try { sessionStorage.setItem('agntai_pending_send_v1', JSON.stringify(pending)); } catch(e){}
    return {body, subject: subject || 'Following up'};
  };

  // After clicking the email anchor, the Gmail/Mail tab opens (or fails). Either way,
  // we show the helper panel right there with a "I sent it — log it" button so when the
  // user comes back, they have a clear way to log what they did. We also set a 2.5s
  // detector — if they're still here, that's a hint mailto: failed and we add a
  // copy-fallback note.
  const onAssistantEmailClick = (content, messageIdx) => {
    const prepared = setupPendingForEmail(content);
    if(!prepared) return;
    // Always copy the body to clipboard as a safety net
    try { navigator.clipboard.writeText(prepared.body); } catch(e){}
    // Show the helper panel immediately
    setAssistantHelper({
      messageIdx,
      channel: 'email',
      email: activeLead.email,
      body: prepared.body,
      subject: prepared.subject,
      fallback: false,
    });
    // Detect if the page handed off (mailto fired). If we're still visible after 2.5s,
    // upgrade the panel to "fallback" mode so the wording explains the manual path.
    setTimeout(() => {
      if(document.visibilityState === 'visible'){
        setAssistantHelper(prev => prev && prev.messageIdx===messageIdx ? {...prev, fallback:true} : prev);
      }
    }, 2500);
  };

  // After clicking Copy on an assistant draft message, also surface the log panel —
  // the user copied because they're going to send manually, so they need a way to log.
  const onAssistantCopyClick = (content, messageIdx) => {
    if(!activeLead) return;
    const {subject, body} = extractDraft(content);
    if(!body) return;
    try { navigator.clipboard.writeText(body); } catch(e){}
    setCopiedKey('cp-'+messageIdx);
    setTimeout(() => setCopiedKey(prev => prev==='cp-'+messageIdx ? null : prev), 1500);
    // Surface the log panel so user can mark it sent after pasting wherever they're using
    setAssistantHelper({
      messageIdx,
      channel: 'sms', // best guess — they can decide manually if needed
      phone: activeLead.phone,
      email: activeLead.email,
      body,
      subject: subject || 'Following up',
      copied: true, // signals: this was a copy, not a send button click
    });
  };

  const sendFromAssistant = (channel, content, messageIdx) => {
    if(!activeLead) return;
    const {subject, body} = extractDraft(content);
    // Guard: don't try to send empty body. If extract failed (no clear draft),
    // copy the raw content and show a helper so user knows what happened.
    if(!body){
      try { navigator.clipboard.writeText(content||''); } catch(e){}
      setAssistantHelper({
        messageIdx, channel,
        phone: activeLead.phone, email: activeLead.email,
        body: content||'',
        subject: subject || 'Following up',
        noDraft: true,
      });
      return;
    }
    const cleanPhone = (activeLead.phone||'').replace(/[^\d+]/g,'');
    // Set pending log unconditionally — covers both desktop helper and mobile handoff
    const pending = {
      leadId: activeLead.id,
      channel,
      body,
      subject: channel==='email' ? (subject||'Following up') : null,
      startedAt: new Date().toISOString(),
    };
    try { sessionStorage.setItem('agntai_pending_send_v1', JSON.stringify(pending)); } catch(e){}

    // Desktop SMS: don't open sms: (Mac Messages opens empty). Show inline helper.
    if(!isMobileDevice && channel==='sms'){
      try { navigator.clipboard.writeText(body); } catch(e){}
      setAssistantHelper({messageIdx, channel:'sms', phone:activeLead.phone, body});
      return;
    }
    // Email: also show the helper alongside the handoff, since on desktop the user
    // may want to log directly without navigating to the lead page.
    if(channel==='email'){
      try { navigator.clipboard.writeText(body); } catch(e){}
      setAssistantHelper({messageIdx, channel:'email', email:activeLead.email, body, subject: subject||'Following up'});
      // Also try to open mail client (works on both desktop and mobile)
      const subj = subject || 'Following up';
      const url = buildEmailUrl(activeLead.email||'', subj, body);
      // Guard against URL being too long for the mail handler
      if(url.length < 1900){
        openProtocolUrl(url);
      }
      return;
    }
    // Mobile SMS: hand off to OS
    let url = '';
    if(channel==='sms'){

  const [open,setOpen]=useState(false);
  const [message,setMessage]=useState('');
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);
  const textRef=React.useRef(null);

  React.useEffect(()=>{
    if(open) setTimeout(()=>textRef.current?.focus(),50);
  },[open]);

  const submit=async()=>{
    const msg=message.trim();
    if(!msg||sending) return;
    setSending(true);
    try {
      const {error}=await db.from('feedback').insert({
        user_id: user?.id,
        user_email: user?.email,
        message: msg,
        view_name: currentView,
        user_agent: navigator.userAgent,
      });
      if(error){
        console.error('Feedback error:',error);
        alert('Could not send feedback. Please try again.');
        setSending(false);

      setOpen(false);

      setSent(true);
      setTimeout(()=>setSent(false),3000);

      console.error('Feedback error:',e);

      setSending(false);

  return React.createElement(React.Fragment,null,
    React.createElement('button',{className:'fb-btn',onClick:()=>setOpen(true),title:'Send feedback'},
      React.createElement('span',{style:{fontSize:14}},'💬'),

        React.createElement('div',{className:'fb-head'},

          React.createElement('button',{className:'fb-close',onClick:()=>setOpen(false),title:'Close'},'×')

// ──────────────────────────────────────────────────────────────────────────────
// DATE CONFIRM STACK
//
// Listens for `date-detected` events dispatched by `detectAndNotify(...)` after
// any save path completes (note save, comm log, next-step save). For each event
// it pushes a confirmation card to the bottom-right stack. Yes → creates a
// confirmed scheduled task on the lead. No → records suppression so the same
// (leadId + dateISO + phrase) never asks again.
//
// Multiple cards can stack. Each card may bundle several matches from the same
// save (e.g. "call Tuesday 4pm, then showing Saturday morning" → one card with
// two checkboxes).
// ──────────────────────────────────────────────────────────────────────────────
function DateConfirmStack() {
  const [cards, setCards] = useState([]); // {id, leadId, leadName, sourceText, sourceLabel, matches, selected}

  React.useEffect(() => {
    const handler = (ev) => {
      const detail = ev.detail || {};
      if(!detail.matches || !detail.matches.length) return;
      const id = 'dc_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      // All matches selected by default — agents will deselect what they don't want.
      const selected = new Set(detail.matches.map((_,i)=>i));
      setCards(prev => [...prev, {
        id,
        leadId: detail.leadId,
        leadName: detail.leadName,
        sourceText: detail.sourceText,
        sourceLabel: detail.sourceLabel || 'note',
        matches: detail.matches,
        selected,
      }]);
    };
    window.addEventListener('date-detected', handler);
    return () => window.removeEventListener('date-detected', handler);
  }, []);

  const dismissCard = (id, suppressMatches=null) => {
    setCards(prev => {
      const card = prev.find(c => c.id === id);
      if(card && suppressMatches) {
        // Record suppression so we don't ask about these same matches again.
        try {
          const raw = localStorage.getItem('agntai_date_dismissed') || '{}';
          const dismissed = JSON.parse(raw);
          suppressMatches.forEach(m => {
            const k = card.leadId + '|' + m.dateISO + '|' + m.phrase.toLowerCase();
            dismissed[k] = Date.now();
          });
          localStorage.setItem('agntai_date_dismissed', JSON.stringify(dismissed));
        } catch(e) {}
      }
      return prev.filter(c => c.id !== id);
    });
  };

  const toggleMatch = (id, idx) => {
    setCards(prev => prev.map(c => {
      if(c.id !== id) return c;
      const sel = new Set(c.selected);
      if(sel.has(idx)) sel.delete(idx); else sel.add(idx);
      return {...c, selected: sel};
    }));
  };

  const confirmCard = async (card) => {
    const chosen = card.matches.filter((_,i) => card.selected.has(i));
    for(const m of chosen) {
      try {
        await dbAddScheduledTask(card.leadId, {
          dueDate: m.dateISO,
          dueTime: m.timeISO || null,
          type: _actionToType(m.action),
          label: _buildTaskLabel(m, card.leadName),
          channel: _actionToChannel(m.action),
          status: 'confirmed', // agent explicitly confirmed — no second confirm step
          source: 'agent_save',
          sourceRef: card.sourceLabel,
        });
      } catch(e) { console.warn('Failed to save task:', e); }
    }
    // Suppress the rejected ones so we don't pester next save
    const rejected = card.matches.filter((_,i) => !card.selected.has(i));
    try { window.dispatchEvent(new CustomEvent('leads-changed')); } catch(e) {}
    dismissCard(card.id, rejected.length ? rejected : null);
  };

  if(!cards.length) return null;

  return React.createElement('div',{className:'dc-stack'},
    ...cards.map(card => {
      const isMulti = card.matches.length > 1;
      return React.createElement('div',{key:card.id,className:'dc-card'},
        React.createElement('div',{className:'dc-head'},
          React.createElement('div',{className:'dc-title'},
            '📅 ',
            isMulti ? `${card.matches.length} dates detected` : 'Date detected',
            card.leadName ? React.createElement('span',{style:{fontWeight:400,color:'#6b6760'}}, ' · '+card.leadName) : null
          ),
          React.createElement('button',{className:'dc-x',title:'Dismiss',onClick:()=>dismissCard(card.id, card.matches)},'×')
        ),
        React.createElement('div',{className:'dc-body'},
          `Add to calendar from this ${card.sourceLabel}?`
        ),
        ...card.matches.map((m, idx) =>
          React.createElement('div',{key:idx,className:'dc-match-row'},
            isMulti && React.createElement('input',{
              type:'checkbox',
              checked:card.selected.has(idx),
              onChange:()=>toggleMatch(card.id, idx),
              style:{cursor:'pointer'}
            }),
            React.createElement('div',{className:'dc-match-info'},
              React.createElement('div',{className:'dc-match-when'}, _formatWhen(m)),
              React.createElement('div',{className:'dc-match-action'},
                _actionToType(m.action),
                m.phrase ? ' · matched: '+m.phrase.trim() : ''
              )
            )
          )
        ),
        React.createElement('div',{className:'dc-acts'},
          React.createElement('button',{className:'dc-no',onClick:()=>dismissCard(card.id, card.matches)},'No, dismiss'),
          React.createElement('button',{
            className:'dc-yes',
            disabled: card.selected.size === 0,
            style: card.selected.size === 0 ? {opacity:0.5, cursor:'not-allowed'} : {},
            onClick:()=>confirmCard(card)
          }, isMulti ? `Add ${card.selected.size} to calendar` : 'Add to calendar')
        )
      );
    })
  );
}

function _buildTaskLabel(match, leadName) {
  const action = _actionToType(match.action);
  const first = (leadName||'').split(' ')[0];
  if(first) return `${action} ${first}`;
  return action;
}

function _formatWhen(m) {
  const d = new Date(m.dateISO + 'T12:00:00');
  const dow = d.toLocaleDateString('en-US', { weekday: 'short' });
  const mon = d.toLocaleDateString('en-US', { month: 'short' });
  const day = d.getDate();
  let s = `${dow}, ${mon} ${day}`;
  if(m.timeISO) {
    const [hh, mm] = m.timeISO.split(':').map(Number);
    const ap = hh >= 12 ? 'pm' : 'am';
    const h12 = hh % 12 || 12;
    s += ` at ${h12}${mm ? ':'+String(mm).padStart(2,'0') : ''}${ap}`;
  }
  return s;
}

        },
          React.createElement('div',{style:{fontSize:24,flexShrink:0,lineHeight:1}},'➕'),

            React.createElement('div',{style:{fontSize:14,fontWeight:600,color:'#1a1916',marginBottom:2}},'Add one lead'),

        ),

        // Path 2 — Import from spreadsheet
        React.createElement('button',{

            React.createElement('div',{style:{fontSize:14,fontWeight:600,color:'#1a1916',marginBottom:2}},'Import from spreadsheet'),
            React.createElement('div',{style:{fontSize:12,color:'#6b6760',lineHeight:1.4}},'Best for 10+ leads — paste your CSV all at once')
          )
        ),

        React.createElement('div',{style:{textAlign:'center'}},
          React.createElement('button',{
            onClick:()=>setShowExperiencedPlaceholder(false),
            style:{background:'none',border:'none',color:'#a09d98',fontSize:13,cursor:'pointer',fontFamily:'inherit'}
          },'Maybe later')
        )
      )
    ),

    React.createElement(FeedbackButton,{user,currentView:view}),
    React.createElement(DateConfirmStack)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
